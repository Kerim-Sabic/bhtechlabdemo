const AI_SCHEMA = [
  'assets(inventory_no, name, category, asset_class, location_id, cost_center, custodian, book_value, status)',
  'dispositions(klass, financial, status, amount, asset_id, commission_id, ts)',
  'locations(id, name, type, parent_id)',
  'commissions(id, name)'
];
const AI_PRESETS = [
  'Which locations have the most unresolved shortages this year?',
  'What is the total book value of assets not yet counted?',
  'List the open financial exceptions by value.',
  'How many assets has each commission counted?',
  'Show all surplus candidates found in the field.'
];
function aiValidations(extra){
  return [
    {label:'AST parse — statement is valid SQL', ok:true},
    {label:'SELECT-only — no INSERT / UPDATE / DELETE / DDL', ok:true},
    {label:'Tenant scope — tenant_id = \'bht\' enforced by gateway', ok:true},
    {label:'Row limit — LIMIT 500 applied', ok:true},
    {label:'Statement timeout — 5000 ms guard set', ok:true}
  ].concat(extra||[]);
}
function dirOf(locId){ const l=Sel.loc(locId); return l? (l.parent_id||l.id) : locId; }

function aiPlan(question){
  const q = (question||'').toLowerCase();
  // 1) shortages by location
  if(q.includes('shortage') || q.includes('missing') || (q.includes('location') && q.includes('most'))){
    return {
      title:'Unresolved shortages by location',
      sql:"SELECT l.name AS location, COUNT(*) AS shortages,\n       SUM(ABS(d.amount)) AS book_value_km\nFROM dispositions d\nJOIN assets a   ON a.id = d.asset_id\nJOIN locations p ON p.id = (SELECT parent_id FROM locations WHERE id = a.location_id)\nJOIN locations l ON l.id = p.id\nWHERE d.klass = 'shortage'\n  AND d.status IN ('open','approved','posting-candidate')\n  AND d.tenant_id = 'bht'\nGROUP BY l.name\nORDER BY shortages DESC\nLIMIT 500;",
      validations: aiValidations(),
      run(s){
        const agg={};
        s.dispositions.filter(d=>d.klass==='shortage' && d.status!=='rejected' && d.asset_id).forEach(d=>{
          const a=s.assets.find(x=>x.id===d.asset_id); if(!a)return;
          const dn=Sel.locName(dirOf(a.location_id));
          agg[dn]=agg[dn]||{location:dn,shortages:0,book_value_km:0,_src:[]};
          agg[dn].shortages++; agg[dn].book_value_km+=Math.abs(d.amount); agg[dn].if=a.inventory_no; agg[dn]._src.push(a.inventory_no);
        });
        const rows=Object.values(agg).sort((a,b)=>b.shortages-a.shortages);
        if(rows.length===0) rows.push({location:'(no shortages recorded yet)',shortages:0,book_value_km:0,_src:[]});
        return {columns:[{key:'location',label:'Location'},{key:'shortages',label:'Shortages',num:true},{key:'book_value_km',label:'Book value',money:true}],
          rows, sources:[].concat.apply([],rows.map(r=>r._src||[]))};
      }
    };
  }
  // 2) book value of uncounted
  if(q.includes('not yet counted')||q.includes('uncounted')||(q.includes('book value')&&q.includes('count'))){
    return {
      title:'Book value of not-yet-counted assets',
      sql:"SELECT a.category, COUNT(*) AS assets, SUM(a.book_value) AS book_value_km\nFROM assets a\nWHERE a.status = 'registered'\n  AND a.tenant_id = 'bht'\nGROUP BY a.category\nORDER BY book_value_km DESC\nLIMIT 500;",
      validations: aiValidations(),
      run(s){
        const agg={};
        s.assets.filter(a=>a.status==='registered').forEach(a=>{
          const c=Sel.catName(a.category);
          agg[c]=agg[c]||{category:c,assets:0,book_value_km:0,_src:[]};
          agg[c].assets++; agg[c].book_value_km+=a.book_value; agg[c]._src.push(a.inventory_no);
        });
        const rows=Object.values(agg).sort((a,b)=>b.book_value_km-a.book_value_km);
        return {columns:[{key:'category',label:'Category'},{key:'assets',label:'Assets',num:true},{key:'book_value_km',label:'Book value',money:true}],
          rows, sources:[].concat.apply([],rows.map(r=>r._src.slice(0,8)))};
      }
    };
  }
  // 3) open financial exceptions by value
  if(q.includes('exception')||q.includes('financial')||q.includes('value change')||q.includes('value-change')){
    return {
      title:'Open financial exceptions by value',
      sql:"SELECT a.inventory_no, d.klass AS exception, ABS(d.amount) AS value_km, d.status\nFROM dispositions d\nLEFT JOIN assets a ON a.id = d.asset_id\nWHERE d.financial = TRUE\n  AND d.status IN ('open','approved')\n  AND d.tenant_id = 'bht'\nORDER BY value_km DESC\nLIMIT 500;",
      validations: aiValidations(),
      run(s){
        const rows=s.dispositions.filter(d=>d.financial && (d.status==='open'||d.status==='approved'))
          .map(d=>({inventory_no:d.inventory_no||'(unregistered)', exception:d.klass, value_km:Math.abs(d.amount), status:d.status, _src:d.inventory_no?[d.inventory_no]:[]}))
          .sort((a,b)=>b.value_km-a.value_km);
        if(rows.length===0) rows.push({inventory_no:'(none open)',exception:'—',value_km:0,status:'—',_src:[]});
        return {columns:[{key:'inventory_no',label:'Inventory no.'},{key:'exception',label:'Exception'},{key:'value_km',label:'Value',money:true},{key:'status',label:'Status'}],
          rows, sources:[].concat.apply([],rows.map(r=>r._src||[]))};
      }
    };
  }
  // 4) counted per commission
  if(q.includes('commission')||q.includes('counted')||q.includes('progress')){
    return {
      title:'Assets counted per commission',
      sql:"SELECT c.name AS commission, COUNT(d.id) AS counted\nFROM dispositions d\nJOIN commissions c ON c.id = d.commission_id\nWHERE d.klass IN ('matched','duplicate-conflict','shortage','metadata-diff')\n  AND d.tenant_id = 'bht'\nGROUP BY c.name\nORDER BY counted DESC\nLIMIT 500;",
      validations: aiValidations(),
      run(s){
        const agg={};
        s.dispositions.forEach(d=>{
          const c=Sel.commission(d.commission_id); if(!c)return;
          agg[c.name]=agg[c.name]||{commission:c.name,counted:0,_src:[]};
          agg[c.name].counted++; if(d.inventory_no)agg[c.name]._src.push(d.inventory_no);
        });
        const rows=Object.values(agg).sort((a,b)=>b.counted-a.counted);
        if(rows.length===0) rows.push({commission:'(none)',counted:0,_src:[]});
        return {columns:[{key:'commission',label:'Commission'},{key:'counted',label:'Captures',num:true}],
          rows, sources:[].concat.apply([],rows.map(r=>r._src.slice(0,6)))};
      }
    };
  }
  // 5) surplus candidates (also the default fallback)
  return {
    title:'Surplus candidates found in the field',
    sql:"SELECT d.asset_name, d.amount AS est_value_km, d.commission_id, d.status\nFROM dispositions d\nWHERE d.klass = 'surplus'\n  AND d.tenant_id = 'bht'\nORDER BY est_value_km DESC\nLIMIT 500;",
    validations: aiValidations(question? null : [{label:'Note — free-text mapped to nearest safe template', ok:true}]),
    run(s){
      const rows=s.dispositions.filter(d=>d.klass==='surplus').map(d=>({
        asset_name:d.asset_name, est_value_km:Math.abs(d.amount),
        commission:(Sel.commission(d.commission_id)||{}).name||'—', status:d.status, _src:[]}));
      if(rows.length===0) rows.push({asset_name:'(no surplus candidates)',est_value_km:0,commission:'—',status:'—',_src:[]});
      return {columns:[{key:'asset_name',label:'Asset'},{key:'est_value_km',label:'Est. value',money:true},{key:'commission',label:'Commission'},{key:'status',label:'Status'}],
        rows, sources:[]};
    }
  };
}

function aiAnomalies(s){
  const flags=[];
  // shortage rate per directorate vs fabricated 3-yr baseline
  const dirs = s.locations.filter(l=>l.type==='directorate');
  dirs.forEach(dir=>{
    const assetsHere = s.assets.filter(a=>dirOf(a.location_id)===dir.id);
    const counted = assetsHere.filter(a=>a.status!=='registered').length;
    const shortages = s.dispositions.filter(d=>d.klass==='shortage' && d.status!=='rejected' && d.asset_id &&
      dirOf((s.assets.find(a=>a.id===d.asset_id)||{}).location_id)===dir.id).length;
    const rate = counted? shortages/counted : 0;
    const baseline = {'dir-sa':0.012,'dir-mo':0.018,'dir-tu':0.015}[dir.id]||0.015;
    const ratio = baseline? (rate/baseline) : 0;
    if(shortages>0 && ratio>=1.8){
      flags.push({severity: ratio>=3?'high':'medium', title:dir.city+' — elevated shortage rate',
        detail:'Shortage rate of '+(rate*100).toFixed(1)+'% across '+counted+' counted assets is '+ratio.toFixed(1)+'× this location’s 3-year average ('+(baseline*100).toFixed(1)+'%).',
        basis:'statistical · z-score on annual shortage ratio', signal:true,
        sources: s.dispositions.filter(d=>d.klass==='shortage'&&d.asset_id&&dirOf((s.assets.find(a=>a.id===d.asset_id)||{}).location_id)===dir.id).map(d=>d.inventory_no)});
    }
  });
  // high-value single exception flag
  const bigEx = s.dispositions.filter(d=>d.financial && d.status!=='rejected').sort((a,b)=>Math.abs(b.amount)-Math.abs(a.amount))[0];
  if(bigEx && Math.abs(bigEx.amount)>=8000){
    flags.push({severity:'medium', title:'High-value exception above 8.000 KM threshold',
      detail:(bigEx.klass)+' on '+(bigEx.inventory_no||bigEx.asset_name)+' carries a '+fmtMoney(Math.abs(bigEx.amount))+' impact — above the materiality threshold for single-item review.',
      basis:'rule · materiality threshold', signal:true, sources: bigEx.inventory_no?[bigEx.inventory_no]:[]});
  }
  // uncounted concentration near cutoff
  const prog = Sel.progress();
  if(prog.pct<70){
    flags.push({severity:'low', title:'Counting pace behind schedule vs cutoff',
      detail:prog.pct+'% counted with the campaign cutoff '+fmtDateShort(s.campaign.cutoff)+'. At the current rate, completion is projected after the legal cutoff.',
      basis:'trend · burn-down projection', signal:true, sources:[]});
  }
  if(flags.length===0) flags.push({severity:'low', title:'No statistical anomalies detected',
    detail:'All monitored ratios are within their historical baselines for the current campaign.', basis:'—', signal:false, sources:[]});
  return flags;
}

/* ---- focus management helpers ---- */
let _lastFocus=null;
function trapFocus(container){
  const sel='a[href],button:not([disabled]),input:not([disabled]),select:not([disabled]),textarea:not([disabled]),[tabindex]:not([tabindex="-1"])';
  function onKey(e){
    if(e.key!=='Tab')return;
    const f=$$(sel,container).filter(n=>n.offsetParent!==null);
    if(!f.length)return;
    const first=f[0], last=f[f.length-1];
    if(e.shiftKey && document.activeElement===first){ e.preventDefault(); last.focus(); }
    else if(!e.shiftKey && document.activeElement===last){ e.preventDefault(); first.focus(); }
  }
  container.addEventListener('keydown',onKey);
}

/* ---- modal ---- */
function openModal(opts){
  _lastFocus=document.activeElement;
  const host=$('#modal-host');
  host.innerHTML='';
  const scrim=el('div',{class:'modal-scrim'});
  const modal=el('div',{class:'modal', role:'dialog', 'aria-modal':'true', 'aria-label':opts.title||'Dialog'});
  modal.innerHTML=
    '<div class="modal-h"><h3 id="modal-title">'+esc(opts.title||'')+'</h3>'+
    (opts.noClose?'':'<button class="icon-x" data-modal-close aria-label="Close">'+icon('x')+'</button>')+'</div>'+
    '<div class="modal-b">'+(opts.body||'')+'</div>'+
    (opts.footer?'<div class="modal-f">'+opts.footer+'</div>':'');
  host.appendChild(scrim); host.appendChild(modal);
  host.classList.add('show');
  trapFocus(modal);
  if(!opts.noScrimClose) scrim.addEventListener('click',closeModal);
  $$('[data-modal-close]',modal).forEach(b=>b.addEventListener('click',closeModal));
  if(opts.onMount) opts.onMount(modal);
  const focusTarget = modal.querySelector('[data-autofocus]') || modal.querySelector('input,textarea,select,button.primary') || modal.querySelector('button');
  if(focusTarget) setTimeout(()=>focusTarget.focus(),30);
  return modal;
}
function closeModal(){
  const host=$('#modal-host');
  host.classList.remove('show'); host.innerHTML='';
  if(_lastFocus && _lastFocus.focus){ try{_lastFocus.focus();}catch(e){} }
}
function confirmModal(opts){
  return new Promise(resolve=>{
    openModal({
      title:opts.title||'Confirm',
      body:'<p style="margin:0;color:var(--soft)">'+esc(opts.message||'')+'</p>',
      footer:'<button class="btn" data-no>'+(opts.cancel||'Cancel')+'</button>'+
             '<button class="btn '+(opts.danger?'danger':'primary')+'" data-yes>'+(opts.confirm||'Confirm')+'</button>',
      onMount(m){
        m.querySelector('[data-no]').addEventListener('click',()=>{closeModal();resolve(false);});
        m.querySelector('[data-yes]').addEventListener('click',()=>{closeModal();resolve(true);});
      }
    });
  });
}

/* ---- focus-preserving render scheduler ---- */
let _renderQueued=false;
function scheduleRender(){
  if(_renderQueued)return; _renderQueued=true;
  requestAnimationFrame(()=>{ _renderQueued=false; App.render(); });
}
function withFocusPreserved(fn){
  const a=document.activeElement;
  const id=a&&a.id; const ss=a&&a.selectionStart; const se=a&&a.selectionEnd;
  fn();
  if(id){ const n=document.getElementById(id); if(n){ try{ n.focus(); if(ss!=null&&n.setSelectionRange) n.setSelectionRange(ss,se);}catch(e){} } }
}

    title:'', noClose:true,

    onMount(m){
      const q=m.querySelector('#cmdk-q'), list=m.querySelector('#cmdk-list');
      function draw(){
        list.innerHTML=filtered.length? filtered.map((c,idx)=>'<button class="cmdk-item'+(idx===sel?' on':'')+'" data-idx="'+idx+'">'+
          '<span class="pop-ic grey">'+icon(c.icon)+'</span><span class="flex1">'+esc(c.label)+'</span>'+(idx===sel?'<kbd>↵</kbd>':'')+'</button>').join('')
          : '<div class="pop-empty" style="padding:20px">No matches</div>';
        $$('[data-idx]',list).forEach(b=>b.addEventListener('click',()=>{ run(parseInt(b.getAttribute('data-idx'),10)); }));
      }
      function run(idx){ const c=filtered[idx]; if(!c)return; closeModal(); c.run(); }
      q.addEventListener('input',()=>{ const t=q.value.toLowerCase(); filtered=cmds.filter(c=>c.label.toLowerCase().includes(t)); sel=0; draw(); });
      q.addEventListener('keydown',e=>{
        if(e.key==='ArrowDown'){ e.preventDefault(); sel=Math.min(filtered.length-1,sel+1); draw(); }
        else if(e.key==='ArrowUp'){ e.preventDefault(); sel=Math.max(0,sel-1); draw(); }
        else if(e.key==='Enter'){ e.preventDefault(); run(sel); }
      });
      draw();
    }
  });

/* ---- App: single render path ---- */
const App = {
  render(){
    const s=Store.get(), ui=s.ui;
    withFocusPreserved(()=>{
      const root=$('#root');
      if(!ui.authed){ root.innerHTML=loginHtml(); wireLogin(); return; }
      if(ui.surface==='mobile'){
        root.innerHTML=topbarHtml()+'<div class="phone-stage" id="phone-stage"></div>'+footerHtml();
      }else{
        root.innerHTML=topbarHtml()+webShellHtml();

function wireLogin(){
  $$('[data-login]').forEach(b=>b.addEventListener('click',()=>{
    const r=b.getAttribute('data-login');
    Store.setUI({authed:true, role:r, surface:'web', route:'#/dashboard'});
    if(location.hash!=='#/dashboard') location.hash='#/dashboard';
    toast({type:'ok',title:'Signed in',msg:'Welcome, '+ROLE_USER[r].name+' — '+r+'.'});
  }));

/* global keyboard: ⌘K / Ctrl+K command palette */
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey) && (e.key==='k'||e.key==='K')){
    e.preventDefault();
    if(Store.get() && Store.get().ui.authed && !$('#modal-host').classList.contains('show')) openCommandPalette();
  }
});
function renderView(){
  const view=$('#view'); if(!view)return;
  if(Store.get().ui.tenantId!=='bht'){
    view.innerHTML=isolatedTenantView();
    const b=view.querySelector('[data-tenant-back]'); if(b) b.addEventListener('click',()=>Store.setUI({tenantId:'bht'}));
    return;
  }
  const route=Store.get().ui.route;
  if(!canAccess(route)){ view.innerHTML=noAccess(); return; }
  const screen=SCREENS[route]||SCREENS['#/dashboard'];
  try{ screen(view); }catch(e){ console.error('screen error',route,e); view.innerHTML='<div class="card pad">Screen error: '+esc(e.message)+'</div>'; }
}

function wireChrome(){
  $$('[data-surface]').forEach(b=>b.addEventListener('click',()=>{
    Store.setUI({surface:b.getAttribute('data-surface')});
  }));
  const rs=$('#role-sel'); if(rs) rs.addEventListener('change',()=>{
    Store.setUI({role:rs.value});
    toast({type:'info',title:'Role switched',msg:'You are now acting as '+rs.value+'.'});
  });
  const tb=$('#tour-btn'); if(tb) tb.addEventListener('click',()=>Tour.choose());
  const bell=$('#bell-btn'); if(bell) bell.addEventListener('click',e=>{ e.stopPropagation(); const wasMine=$('.popover')&&_popAnchor===bell; closePopover(); if(!wasMine) openBellMenu(bell); });
  const usr=$('#user-btn'); if(usr) usr.addEventListener('click',e=>{ e.stopPropagation(); const wasMine=$('.popover')&&_popAnchor===usr; closePopover(); if(!wasMine) openUserMenu(usr); });
  const ten=$('#tenant-btn'); if(ten) ten.addEventListener('click',e=>{ e.stopPropagation(); const wasMine=$('.popover')&&_popAnchor===ten; closePopover(); if(!wasMine) openTenantMenu(ten); });
  const ck=$('#cmdk-btn'); if(ck) ck.addEventListener('click',()=>openCommandPalette());
  const rb=$('#reset-btn'); if(rb) rb.addEventListener('click',async()=>{
    const ok=await confirmModal({title:'Reset demo?',message:'This restores the original seed data and clears all captures, conflicts, approvals and audit entries created during this session.',confirm:'Reset demo',danger:true});
    if(ok){ Tour.stop(); Store.reset(); navigate('#/dashboard'); toast({type:'ok',title:'Demo reset',msg:'Seed data restored.'}); }
  });
  $$('[data-nav]').forEach(n=>{
    const go=()=>navigate(n.getAttribute('data-nav'));
    n.addEventListener('click',go);
    n.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); go(); } });
  });
}

/* ---- router ---- */
function navigate(hash){
  if(location.hash!==hash){ location.hash=hash; }
  else { Store.setUI({route:hash}); }
}
function onHashChange(){
  const hash=location.hash||'#/dashboard';
  Store.setUI({route:hash});
  // scroll view to top on navigation
  const v=$('#view'); if(v) v.scrollTop=0;
}

/* global delegation: [data-go] navigates anywhere in the app */
document.addEventListener('click',e=>{
  const g=e.target.closest && e.target.closest('[data-go]');
  if(g){ e.preventDefault(); navigate(g.getAttribute('data-go')); }
});

function pagerHtml(page,pages){
  let h='<button data-page="'+(page-1)+'" '+(page<=1?'disabled':'')+' aria-label="Previous">‹</button>';
  const win=[]; for(let p=1;p<=pages;p++){ if(p===1||p===pages||Math.abs(p-page)<=1) win.push(p); else if(win[win.length-1]!=='…') win.push('…'); }
  win.forEach(p=>{ h+= p==='…' ? '<span style="padding:0 4px;color:var(--faint)">…</span>' : '<button data-page="'+p+'" class="'+(p===page?'on':'')+'">'+p+'</button>'; });
  h+='<button data-page="'+(page+1)+'" '+(page>=pages?'disabled':'')+' aria-label="Next">›</button>';
  return h;
}

const liabState={q:{search:'',type:'',status:''}, result:null, loading:false, token:0};
function liabStats(){
  const ls=Store.get().liabilities;
  let total=0, confirmed=0, open=0, varSum=0, disc=0;
  ls.forEach(l=>{ total+=l.book_value; if(l.status==='confirmed')confirmed++; else if(l.status==='discrepancy'){disc++; varSum+=Math.abs(l.variance);} else open++; });
  return {count:ls.length, total, confirmed, open, disc, varSum, pct: ls.length?Math.round(confirmed/ls.length*100):0};
}

  const st=liabStats();
  const typeOpts=['<option value="">All types</option>','payable','accrual','provision','deferred'].map(t=>typeof t==='string'&&t.startsWith('<')?t:'<option value="'+t+'"'+(liabState.q.type===t?' selected':'')+'>'+t.charAt(0).toUpperCase()+t.slice(1)+'</option>').join('');
  const statusOpts=['<option value="">Any status</option>','registered','confirmed','discrepancy'].map(t=>typeof t==='string'&&t.startsWith('<')?t:'<option value="'+t+'"'+(liabState.q.status===t?' selected':'')+'>'+t.charAt(0).toUpperCase()+t.slice(1)+'</option>').join('');

    pageHead('Liabilities inventory', 'The other half of the legal mandate — obaveze. Each liability is confirmed against the counterparty statement; differences become discrepancies.',

    '<div class="grid g4 mb20">'+
      kpi('Total liabilities',fmtMoney(st.total),fmtNum(st.count)+' items','navy','scale')+
      kpi('Confirmed',st.confirmed+' / '+st.count,st.pct+'% reconciled','accent','checkCircle')+
      kpi('Open',st.open,'awaiting confirmation',st.open?'gold':'navy','clock')+
      kpi('Discrepancy value',fmtMoney(st.varSum),st.disc+' flagged',st.disc?'danger':'navy','trendingDown')+

      '<div class="search"><span>'+icon('search')+'</span><input id="lia-search" type="text" placeholder="Search doc no., counterparty, type…" value="'+esc(liabState.q.search)+'"></div>'+
      '<div class="selct"><select id="lia-type">'+typeOpts+'</select></div>'+
      '<div class="selct"><select id="lia-status">'+statusOpts+'</select></div>'+

function openResolveModal(dispId){
  const d=Sel.dispositions().find(x=>x.id===dispId); if(!d)return;
  const isDup=d.klass==='duplicate-conflict';
  const choices=isDup?[
    {v:'keep-first',t:'Keep first count',d:'Void the duplicate; keep '+esc(d.detail.firstBy)+'’s count.'},
    {v:'keep-second',t:'Keep second count',d:'Treat '+esc(d.detail.secondBy)+'’s count as authoritative.'},
    {v:'void-both',t:'Void both & recount',d:'Reject both captures; asset returns to the worklist.'}
  ]:[
    {v:'update-master',t:'Update master from field',d:'Generate a metadata change (auto-pushed to SAP after review).'},
    {v:'keep-book',t:'Keep book value',d:'Field reading is noise; no change to SAP.'}
  ];
  openModal({
    title:'Resolve conflict',
    body:'<div class="row gap8 mb16">'+klassChip(d.klass)+'<span class="muted ui" style="font-size:13px">'+esc(d.inventory_no||d.asset_name)+'</span></div>'+
      '<div class="label mb8">Decision</div><div id="rc-choices">'+
      choices.map((c,i)=>'<label class="radio-card'+(i===0?' on':'')+'" data-choice="'+c.v+'"><div class="rc-t">'+c.t+'</div><div class="rc-d">'+c.d+'</div></label>').join('')+
      '</div>'+
      '<div class="field mt16"><label>Reason (recorded in audit)</label><textarea id="rc-reason" placeholder="e.g. Confirmed with commission member; first scan is correct."></textarea></div>',
    footer:'<button class="btn" data-modal-close>Cancel</button><button class="btn primary" id="rc-go">'+icon('check')+'Record resolution</button>',
    onMount(m){
      let choice=choices[0].v;
      $$('#rc-choices .radio-card',m).forEach(c=>c.addEventListener('click',()=>{
        $$('#rc-choices .radio-card',m).forEach(x=>x.classList.remove('on')); c.classList.add('on'); choice=c.getAttribute('data-choice');
      }));
      m.querySelector('#rc-go').addEventListener('click',async()=>{
        const reason=m.querySelector('#rc-reason').value.trim();
        const btn=m.querySelector('#rc-go'); btn.disabled=true; btn.innerHTML='<span class="spinner"></span>Saving…';
        try{
          await api.resolveConflict(dispId,choice,reason||'(no reason given)');
          closeModal(); toast({type:'ok',title:'Conflict resolved',msg:'Decision recorded in the audit log.'});
        }catch(e){ btn.disabled=false; btn.innerHTML=icon('check')+'Record resolution'; toast({type:'err',msg:e.message||'Failed to resolve.'}); }
      });
    }
  });
}

/* ---------- REVIEW & APPROVALS (Accounting gate) ---------- */
function screenReview(view){
  const reviews=Sel.reviews();
  const role=Store.get().ui.role;
  const readOnly=(role==='Auditor');
  view.innerHTML=
    pageHead('Review & approvals', 'Financial exceptions — shortages, surpluses and value changes. Approval here is the only path from disposition to posting candidate.',
      '<span class="chip '+(reviews.length?'gold':'green')+'">'+reviews.length+' awaiting</span>')+
    '<div class="callout navy mb16">'+icon('shield')+'<div><b>Nothing posts to SAP automatically.</b> The furthest the platform moves an item on its own is to this gate. A human with the Accounting role must approve before it can even become a posting candidate.</div></div>'+
    (readOnly?'<div class="callout gold mb16">'+icon('eye')+'<div>Auditor view — read-only. You can inspect the queue and reasons but cannot approve or reject.</div></div>':'')+
    (reviews.length? '<div class="grid" style="gap:16px">'+reviews.map(d=>reviewCard(d,readOnly)).join('')+'</div>'
      : '<div class="card">'+emptyState('checkCircle','Nothing to review','Financial exceptions captured in the field will queue here for Accounting approval.')+'</div>')+
    disclaimerNote();
  $$('[data-approve]').forEach(b=>b.addEventListener('click',()=>openApproveModal(b.getAttribute('data-approve'),b.getAttribute('data-decision'))));
  $$('[data-asset-link]').forEach(b=>b.addEventListener('click',()=>openAssetDrawer(b.getAttribute('data-asset-link'))));
}
function reviewCard(d,readOnly){
  const gate=canApproveReview(d);
  const amt=Math.abs(d.amount);
  const tone=d.klass==='surplus'?'gold':'danger';
  const det=d.detail||{};
  let context='';
  if(d.klass==='shortage') context='Booked asset not physically located. Full book value at risk.';
  else if(d.klass==='surplus') context='Physical asset with no book record — '+esc(det.category||'')+', est. '+fmtMoney(det.estValue||amt)+', at '+esc(det.location||'—')+'.';
  else if(d.klass==='value-change') context=esc(det.note||'Value change / impairment.');
  return '<div class="card pad fade-in">'+
    '<div class="row between mb12"><div class="row gap8">'+klassChip(d.klass)+
      (d.inventory_no?'<button class="btn xs ghost" data-asset-link="'+d.asset_id+'"><span class="mono">'+esc(d.inventory_no)+'</span></button>':'<span class="chip grey">unregistered</span>')+
      '<span class="muted ui" style="font-size:12px">'+esc(d.asset_name)+'</span></div>'+
      '<div class="k-val" style="font-size:22px;color:var(--'+tone+')">'+(d.amount<0?'−':'+')+fmtMoney(amt)+'</div></div>'+
    '<p class="soft" style="font-size:13.5px;margin:0 0 12px">'+context+'</p>'+
    '<dl class="dl" style="grid-template-columns:130px 1fr">'+
      dlRow('Captured by',esc(d.capturedBy))+
      dlRow('Commission',esc(Sel.commission(d.commission_id)?.name||'—'))+
      dlRow('Correlation','<span class="mono">'+shortId(d.correlation_id)+'</span>')+
    '</dl>'+
    '<div class="divider"></div>'+
    (readOnly?'<div class="row right"><span class="chip grey">read-only</span></div>':
      (!gate.ok && gate.reason==='sod'?
        '<div class="callout danger" style="font-size:12.5px">'+icon('lock')+'<div><b>Separation of duties:</b> you captured this exception, so you cannot approve it. Another authorised user must decide.</div></div>'
      : !gate.ok ?
        '<div class="callout gold" style="font-size:12.5px">'+icon('lock')+'<div>Your role cannot approve financial exceptions — Accounting approval required.</div></div>'
      :
        '<div class="row right gap8"><button class="btn danger sm" data-approve="'+d.id+'" data-decision="reject">'+icon('x')+'Reject</button>'+
        '<button class="btn primary sm" data-approve="'+d.id+'" data-decision="approve">'+icon('check')+'Approve → posting candidate</button></div>'))+
  '</div>';
}
function openApproveModal(dispId,decision){
  const d=Sel.dispositions().find(x=>x.id===dispId); if(!d)return;
  const approve=decision==='approve';
  openModal({
    title:(approve?'Approve':'Reject')+' financial exception',
    body:'<div class="row gap8 mb12">'+klassChip(d.klass)+'<span class="muted ui" style="font-size:13px">'+esc(d.inventory_no||d.asset_name)+' · '+(d.amount<0?'−':'+')+fmtMoney(Math.abs(d.amount))+'</span></div>'+
      '<div class="callout '+(approve?'accent':'gold')+'" style="font-size:12.5px;margin-bottom:14px">'+icon(approve?'arrowRight':'info')+'<div>'+
        (approve?'On approval this becomes a <b>posting candidate</b>. It still will not post to SAP — it is staged for manual release.':'On rejection the asset returns to <b>counted</b> with no financial effect. The decision and reason are logged.')+
      '</div></div>'+
      '<div class="field"><label>Reason (required — recorded in audit)</label><textarea id="ap-reason" placeholder="'+(approve?'e.g. Verified with custodian; equipment confirmed missing after relocation.':'e.g. Asset later located in adjacent rack; not a true shortage.')+'"></textarea><div class="errmsg">A reason of at least 3 characters is required.</div></div>',
    footer:'<button class="btn" data-modal-close>Cancel</button><button class="btn '+(approve?'primary':'danger')+'" id="ap-go">'+icon(approve?'check':'x')+(approve?'Approve':'Reject')+'</button>',
    onMount(m){
      m.querySelector('#ap-go').addEventListener('click',async()=>{
        const ta=m.querySelector('#ap-reason'); const reason=ta.value.trim();
        const field=ta.closest('.field');
        if(reason.length<3){ field.classList.add('err'); ta.focus(); return; }
        field.classList.remove('err');
        const btn=m.querySelector('#ap-go'); btn.disabled=true; btn.innerHTML='<span class="spinner"></span>Recording…';
        try{
          await api.approve(dispId,decision,reason);
          closeModal();
          toast({type: approve?'ok':'info', title: approve?'Approved':'Rejected',
            msg: approve?'Now a posting candidate — staged, not posted.':'Exception rejected and logged.'});
        }catch(e){ btn.disabled=false; btn.innerHTML=icon(approve?'check':'x')+(approve?'Approve':'Reject'); toast({type:'err',title:'Blocked',msg:e.message}); }
      });
    }
  });
}
SCREENS['#/review']=screenReview;

/* ---------- ERP SYNC (controlled return) ---------- */
function screenSync(view){
  const s=Store.get();
  const metaReady=s.dispositions.filter(d=>d.status==='metadata-ready');
  const finApproved=s.dispositions.filter(d=>d.status==='approved');
  const pending=metaReady.length+finApproved.length;
  const sap=api.sapStatus();
  view.innerHTML=
    pageHead('ERP sync — controlled return', 'Approved results return to '+esc(s.sourceOfTruth)+' under control. Stage a candidate, then a human releases it — that is the only way anything reaches SAP.',
      '<button class="btn primary" id="prep-btn" '+(pending?'':'disabled')+'>'+icon('database')+'Prepare posting candidates ('+pending+')</button>')+
    '<div class="callout danger mb16">'+icon('shield')+'<div><b>The platform never posts to SAP automatically.</b> Step 1 <b>prepares</b> a candidate payload; step 2 a human clicks <b>Release to SAP</b>, which posts BAPI documents to the (simulated) SAP. SAP remains the system of record at all times.</div></div>'+
    '<div class="callout navy mb20">'+icon('database')+'<div>Target: <b>'+esc(sap.system)+'</b> · client '+sap.client+' · company code '+sap.companyCode+' · <span style="color:var(--accent)">●</span> connected · '+sap.documents+' document(s) posted so far. <a data-go="#/sap">Open SAP console →</a></div></div>'+
    '<div class="grid g2" style="align-items:start">'+
      '<div class="card"><div class="card-h"><h3>'+icon('edit')+' Metadata changes</h3><span class="chip grey">auto after review</span></div>'+
        '<div class="card-b">'+
          (metaReady.length? metaReady.map(d=>syncRow(d,'meta')).join('')
            : '<p class="muted ui" style="font-size:13px">No metadata changes pending. Resolve a stale-master conflict choosing "update master" to populate this.</p>')+
        '</div></div>'+
      '<div class="card"><div class="card-h"><h3>'+icon('scale')+' Financial changes</h3><span class="chip gold">gated · approved</span></div>'+
        '<div class="card-b">'+
          (finApproved.length? finApproved.map(d=>syncRow(d,'fin')).join('')
            : '<p class="muted ui" style="font-size:13px">No approved financial exceptions waiting. Approve items in Review &amp; approvals first.</p>')+
        '</div></div>'+
    '</div>'+
    '<div class="mt20" id="postings">'+postingsHtml()+'</div>'+
    disclaimerNote();
  const pb=$('#prep-btn'); if(pb) pb.addEventListener('click',doPrepare);
  $$('[data-view-posting]').forEach(b=>b.addEventListener('click',()=>viewPosting(b.getAttribute('data-view-posting'))));
  $$('[data-release]').forEach(b=>b.addEventListener('click',()=>doReleaseToSap(b.getAttribute('data-release'))));
}
function syncRow(d,kind){
  return '<div class="row between" style="padding:10px 0;border-bottom:1px solid var(--line)">'+
    '<div><div class="ui" style="font-size:13px;font-weight:600">'+esc(d.inventory_no||d.asset_name)+'</div>'+
      '<div class="muted ui" style="font-size:11px">'+(kind==='meta'?'location → '+esc(d.detail.capturedLabel||'updated'):klassChip(d.klass).replace(/<[^>]+>/g,'')+' · '+(d.amount<0?'−':'+')+fmtMoney(Math.abs(d.amount)))+'</div></div>'+
    '<span class="chip '+(kind==='meta'?'navy':'gold')+'">'+(kind==='meta'?'BAPI_FIXEDASSET_CHANGE':'candidate')+'</span></div>';
}
function postingsHtml(){
  const ps=Store.get().postings;
  if(!ps.length) return '';
  return '<div class="card"><div class="card-h"><h3>Posting candidates</h3><span class="muted ui" style="font-size:11px">prepare → human release → SAP</span></div>'+
    '<div class="tbl-wrap" style="border:0;box-shadow:none"><table class="tbl"><thead><tr><th>Candidate ID</th><th>Items</th><th>Prepared by</th><th>Status</th><th style="text-align:right">Actions</th></tr></thead><tbody>'+
    ps.map(p=>'<tr><td class="mono">'+esc(p.id)+'</td><td class="tnum">'+p.count+'</td><td style="font-size:13px">'+esc(p.by)+'</td>'+
      '<td>'+(p.posted
        ? '<span class="chip green">'+icon('checkCircle')+' Posted</span><div class="mono" style="font-size:10.5px;color:var(--faint);margin-top:3px">BELNR '+p.documents.map(d=>d.belnr).join(', ')+'</div>'
        : '<span class="chip gold">staged · not posted</span>')+'</td>'+
      '<td style="text-align:right"><div class="row gap6" style="justify-content:flex-end">'+
        '<button class="btn xs" data-view-posting="'+p.id+'">'+icon('eye')+'JSON</button>'+
        (p.posted ? '' : '<button class="btn xs primary" data-release="'+p.id+'">'+icon('database')+'Release to SAP</button>')+
      '</div></td></tr>').join('')+
    '</tbody></table></div></div>';
}
async function doPrepare(){
  const btn=$('#prep-btn'); btn.disabled=true; btn.innerHTML='<span class="spinner"></span>Staging candidate payload…';
  try{
    const res=await api.prepareCandidates();
    if(!res.count){ toast({type:'info',msg:'Nothing approved to prepare yet.'}); return; }
    toast({type:'ok',title:'Posting candidate prepared',msg:res.count+' item(s) staged — click “Release to SAP” to post.'});
    viewPosting(res.posting.id);
  }catch(e){ toast({type:'err',msg:e.message||'Failed to prepare.'}); }
}
function viewPosting(id){
  const p=Store.get().postings.find(x=>x.id===id); if(!p)return;
  const banner = p.posted
    ? '<div class="callout accent" style="font-size:12.5px;margin-bottom:14px">'+icon('checkCircle')+'<div><b>Posted to SAP.</b> '+p.documents.length+' document(s) created: <span class="mono">BELNR '+p.documents.map(d=>d.belnr).join(', ')+'</span>.</div></div>'
    : '<div class="callout danger" style="font-size:12.5px;margin-bottom:14px">'+icon('shield')+'<div><b>This payload is NOT posted yet.</b> It is the exact candidate a human releases into SAP. Status: <span class="mono">CANDIDATE</span>.</div></div>';
  openModal({
    title:'Posting candidate '+p.id,
    body: banner + '<div class="code" style="max-height:360px">'+esc(JSON.stringify(p.payload,null,2))+'</div>',
    footer:'<button class="btn" data-modal-close>Close</button>'+
      '<button class="btn navy" id="dl-json">'+icon('download')+'Download .json</button>'+
      (p.posted?'':'<button class="btn primary" id="rel-go">'+icon('database')+'Release to SAP</button>'),
    onMount(m){
      m.querySelector('#dl-json').addEventListener('click',()=>downloadBlob(p.id+'.json',JSON.stringify(p.payload,null,2),'application/json'));
      const rg=m.querySelector('#rel-go'); if(rg) rg.addEventListener('click',()=>{ closeModal(); doReleaseToSap(p.id); });
    }
  });
}
function doReleaseToSap(id){
  const p=Store.get().postings.find(x=>x.id===id); if(!p)return;
  openModal({
    title:'Release to SAP — '+p.id,
    noScrimClose:true,
    body:'<div class="row gap8 mb16">'+icon('database')+'<span class="muted ui" style="font-size:12.5px">'+esc(api.sapStatus().system)+' · client 100 · company BHT1 · '+p.count+' item(s)</span></div>'+
      '<div id="rel-steps"></div>'+
      '<div id="rel-result" class="hidden"></div>',
    footer:'<button class="btn" data-modal-close id="rel-cancel">Cancel</button>',
    onMount(m){
      const host=m.querySelector('#rel-steps');
      const labels=['Opening RFC connection to SAP','Validating against SAP posting rules','Posting documents via BAPI','BAPI_TRANSACTION_COMMIT','Reading back BELNR'];
      host.innerHTML=labels.map((t,i)=>'<div class="step" id="rl-'+i+'"><div class="st-dot">'+(i+1)+'</div><div class="flex1"><div class="st-t">'+esc(t)+'</div><div class="st-m" id="rlm-'+i+'"></div></div></div>').join('');
      api.sapPost(id,(i,step,done)=>{
        const node=m.querySelector('#rl-'+i), meta=m.querySelector('#rlm-'+i); if(!node)return;
        if(!done){ node.classList.add('active'); meta.textContent=step.m; node.querySelector('.flex1').insertAdjacentHTML('beforeend','<span class="spin"></span>'); }
        else{ node.classList.remove('active'); node.classList.add('done'); const sp=node.querySelector('.spin'); if(sp)sp.remove(); node.querySelector('.st-dot').innerHTML=icon('check'); }
      }).then(res=>{
        const rr=m.querySelector('#rel-result'); rr.classList.remove('hidden');
        rr.innerHTML='<div class="callout accent mt12" style="font-size:12.5px">'+icon('checkCircle')+'<div><b>Committed in SAP.</b> '+res.documents.length+' document(s) created.</div></div>'+
          '<div class="tbl-wrap mt12"><table class="tbl"><thead><tr><th>BELNR</th><th>Document type</th><th>Tx</th><th>Asset</th><th style="text-align:right">Amount</th></tr></thead><tbody>'+
          res.documents.map(d=>'<tr><td class="mono">'+esc(d.belnr)+'</td><td style="font-size:13px">'+esc(d.doctype)+'</td><td class="mono">'+esc(d.txCode)+'</td><td class="mono">'+esc(d.asset)+'</td><td class="tnum" style="text-align:right">'+fmtMoney(d.amount)+'</td></tr>').join('')+
          '</tbody></table></div>';
        const c=m.querySelector('#rel-cancel'); c.textContent='Close'; c.classList.add('primary');
        m.querySelector('.modal-f').insertAdjacentHTML('afterbegin','<button class="btn navy" id="rel-console">'+icon('database')+'Open SAP console</button>');
        m.querySelector('#rel-console').addEventListener('click',()=>{ closeModal(); navigate('#/sap'); });
        toast({type:'ok',title:'Posted to SAP',msg:res.documents.length+' document(s) created — BELNR '+res.documents.map(d=>d.belnr).join(', ')+'.'});
      }).catch(e=>{ toast({type:'err',title:'Post failed',msg:e.message||'SAP rejected the posting.'}); closeModal(); });
    }
  });
}

const SAP_PALETTE=['var(--navy)','var(--accent)','var(--gold)','var(--danger)','#6a8199','#caa24a','#13937a','#244563','#b5563f'];
function svgMiniBars(values,color){ values=values.filter(v=>!isNaN(v)); const w=120,h=38,n=values.length||1,bw=w/n,max=Math.max(1,...values); let b='';
  values.forEach((v,i)=>{ const bh=Math.max(2,(v/max)*(h-2)); b+='<rect x="'+(i*bw+1.5)+'" y="'+(h-bh)+'" width="'+Math.max(1,bw-3)+'" height="'+bh+'" rx="2" fill="'+color+'" opacity="'+(0.5+0.5*(v/max)).toFixed(2)+'"/>'; });
  return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="38" preserveAspectRatio="none">'+b+'</svg>'; }
function svgMiniDonut(pct,color){ pct=clamp(pct||0,0,100); const r=15,c=2*Math.PI*r,off=c*(1-pct/100);
  return '<svg width="44" height="44" viewBox="0 0 44 44"><circle cx="22" cy="22" r="15" fill="none" stroke="var(--paper2)" stroke-width="5"/><circle cx="22" cy="22" r="15" fill="none" stroke="'+color+'" stroke-width="5" stroke-linecap="round" stroke-dasharray="'+c+'" stroke-dashoffset="'+off+'" transform="rotate(-90 22 22)"/><text x="22" y="25" text-anchor="middle" font-size="10" font-family="Archivo,sans-serif" font-weight="700" fill="var(--soft)">'+Math.round(pct)+'</text></svg>'; }
function fioriTile(o){
  return '<div class="ftile '+(o.tone||'')+'"><div class="ft-lab">'+esc(o.lab)+'</div>'+
    '<div class="row between" style="align-items:flex-end;margin-top:5px"><div><div class="ft-val">'+o.val+'</div><div class="ft-sub">'+esc(o.sub||'')+'</div></div>'+
    (o.donut!=null?'<div style="flex:0 0 auto">'+svgMiniDonut(o.donut,o.donutColor||'var(--accent)')+'</div>':'')+'</div>'+
    (o.chart?'<div class="ft-chart">'+o.chart+'</div>':'')+'</div>';
}
function donutLegend(segs, center){
  segs=segs.filter(s=>s.value>0);
  if(!segs.length) return '<div class="muted ui center" style="font-size:12.5px;padding:28px 0">No data yet</div>';

    (center?'<div style="position:absolute;inset:0;display:grid;place-items:center"><div style="text-align:center"><div style="font-family:var(--serif-d);font-size:17px;font-weight:600;line-height:1">'+center.big+'</div><div class="muted ui" style="font-size:9px">'+esc(center.small)+'</div></div></div>':'')+'</div>'+
    '<div class="flex1" style="min-width:0">'+segs.map(m=>'<div class="row between" style="font-family:var(--sans);font-size:12px;padding:2.5px 0;gap:8px"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:'+m.color+';margin-right:7px"></span>'+esc(m.label)+'</span><b style="white-space:nowrap">'+(m.display||m.value)+'</b></div>').join('')+'</div></div>';
}
function widgetTable(cols,rows){
  return '<div class="tbl-wrap" style="border:0;box-shadow:none;max-height:300px"><table class="tbl"><thead><tr>'+cols.map((c,i)=>'<th'+(i>0?' style="text-align:right"':'')+'>'+esc(c)+'</th>').join('')+'</tr></thead><tbody>'+

}
function widgetList(items){

const SAP_WIDGETS={
  'assets-by-class':{title:'Assets by class',icon:'database',desc:'Count of fixed assets per ANLKL class (bar)',render(s){
    const g={}; s.assets.forEach(a=>{ const k=(a.asset_class.split('·')[1]||a.asset_class).trim(); g[k]=(g[k]||0)+1; });

function stepModal(title, labels, runner, onDone){
  openModal({ title, noScrimClose:true,
    body:'<div id="sm-steps"></div><div id="sm-done" class="hidden"></div>',
    footer:'<button class="btn" data-modal-close id="sm-cancel">Cancel</button>',
    onMount(m){
      const host=m.querySelector('#sm-steps');
      host.innerHTML=labels.map((t,i)=>'<div class="step" id="sm-'+i+'"><div class="st-dot">'+(i+1)+'</div><div class="flex1"><div class="st-t">'+esc(t)+'</div><div class="st-m" id="smm-'+i+'"></div></div></div>').join('');
      runner((i,step,done)=>{ const node=m.querySelector('#sm-'+i),meta=m.querySelector('#smm-'+i); if(!node)return;
        if(!done){ node.classList.add('active'); meta.textContent=step.m; node.querySelector('.flex1').insertAdjacentHTML('beforeend','<span class="spin"></span>'); }
        else{ node.classList.remove('active'); node.classList.add('done'); const sp=node.querySelector('.spin'); if(sp)sp.remove(); node.querySelector('.st-dot').innerHTML=icon('check'); }
      }).then(res=>{ const c=m.querySelector('#sm-cancel'); c.textContent='Done'; c.classList.add('primary'); const dn=m.querySelector('#sm-done'); dn.classList.remove('hidden'); if(onDone)onDone(dn,res); })
      .catch(e=>{ toast({type:'err',msg:e.message||'Failed.'}); closeModal(); });
    }
  });
}

/* ---- download helper (Blob → file) ---- */
function downloadBlob(filename,content,mime){
  try{
    const blob=new Blob([content],{type:mime||'text/plain'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=filename; document.body.appendChild(a); a.click();
    setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); },200);
    toast({type:'ok',title:'Downloaded',msg:filename});
  }catch(e){ toast({type:'err',msg:'Download failed in this browser.'}); }
}

api.createCommission=async function(data){
  await net(180,400);
  if(!data.name||!data.president) throw {status:422,message:'Name and president are required.'};
  let created=null;
  Store.commit(s=>{
    const id='com-'+uuid().slice(0,5);
    created={id,name:data.name,president:data.president,members:data.members||[],locationIds:data.locationIds||[],
      assetIds:s.assets.filter(a=>(data.locationIds||[]).indexOf(a.location_id)>=0).map(a=>a.id)};
    s.commissions.push(created);
    _audit(s,{action:'COMMISSION_CREATED',entity:'commission',entity_id:id,old:'—',new:data.name+' ('+(1+(data.members||[]).length)+' people)'});
    _activity(s,{type:'commission',icon:'users',text:'<b>Commission created</b> — '+esc(data.name)});
  });
  return {ok:true,commission:created};
};

/* ---------- ANALYTICS (inline-SVG charts) ---------- */
function svgDonut(segs, size){
  size=size||140; const r=size/2-10, cx=size/2, cy=size/2, circ=2*Math.PI*r;
  const total=segs.reduce((a,s)=>a+s.value,0)||1; let off=0;
  let rings=segs.filter(s=>s.value>0).map(s=>{ const frac=s.value/total; const dash=frac*circ;
    const el='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+s.color+'" stroke-width="14" stroke-dasharray="'+dash+' '+(circ-dash)+'" stroke-dashoffset="'+(-off)+'" transform="rotate(-90 '+cx+' '+cy+')"/>';
    off+=dash; return el; }).join('');
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+
    '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="var(--paper2)" stroke-width="14"/>'+rings+'</svg>';
}
function svgVBars(items, opts){
  opts=opts||{}; const w=opts.w||440, h=opts.h||180, padL=44, padB=34, padT=12, padR=10;
  const iw=w-padL-padR, ih=h-padT-padB; const max=Math.max(1,...items.map(i=>i.value));
  const bw=iw/items.length; const bar=Math.min(46, bw*0.62);
  let bars='', labels='', grid='';
  for(let g=0;g<=3;g++){ const y=padT+ih-(g/3)*ih; const lab=opts.fmt?opts.fmt(max*g/3):String(Math.round(max*g/3));
    grid+='<line x1="'+padL+'" y1="'+y+'" x2="'+(w-padR)+'" y2="'+y+'" stroke="var(--line)"/>'+
    '<text x="'+(padL-6)+'" y="'+(y+3)+'" text-anchor="end" font-size="9" fill="var(--faint)" font-family="Archivo,sans-serif">'+lab+'</text>'; }
  items.forEach((it,idx)=>{ const x=padL+bw*idx+(bw-bar)/2; const bh=(it.value/max)*ih; const y=padT+ih-bh;
    bars+='<rect x="'+x+'" y="'+y+'" width="'+bar+'" height="'+Math.max(0,bh)+'" rx="4" fill="'+(it.color||'var(--accent)')+'"><title>'+esc(it.label+': '+(opts.fmt?opts.fmt(it.value):it.value))+'</title></rect>';
    labels+='<text x="'+(x+bar/2)+'" y="'+(h-padB+14)+'" text-anchor="middle" font-size="9.5" fill="var(--soft)" font-family="Archivo,sans-serif">'+esc(it.short||it.label)+'</text>'; });
  return '<svg width="100%" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="xMidYMid meet">'+grid+bars+labels+'</svg>';
}
function screenAnalytics(view){
  const s=Store.get(), day=86400000, total=s.assets.length;
  const camp=s.campaign, start=camp.opened, end=camp.cutoff;
  const totalDays=Math.max(1,Math.round((end-start)/day)), nowDay=clamp(Math.round((Date.now()-start)/day),0,totalDays);
  // distinct counted timestamps
  const firstTs={}; s.dispositions.forEach(d=>{ if(d.asset_id){ if(!firstTs[d.asset_id]||d.ts<firstTs[d.asset_id]) firstTs[d.asset_id]=d.ts; } });
  const cts=Object.values(firstTs).sort((a,b)=>a-b);
  // burn-down line
  const W=760,H=240,padL=40,padB=28,padT=14,padR=14,iw=W-padL-padR,ih=H-padT-padB;
  const sx=x=>padL+(x/totalDays)*iw, sy=y=>padT+ih-(y/100)*ih;
  let actualPts='', c=0,j=0;
  for(let dd=0; dd<=nowDay; dd++){ const cut=start+dd*day; while(j<cts.length && cts[j]<=cut){ c++; j++; } actualPts+=(actualPts?' ':'')+sx(dd)+','+sy(total?c/total*100:0); }
  const curPct=total?Math.round(c/total*100):0;
  const projDay = c>0 ? Math.min(totalDays*1.5, total/(c/Math.max(1,nowDay))) : totalDays*2;
  const onTrack = projDay<=totalDays;
  let grid='';
  for(let g=0;g<=4;g++){ const y=padT+ih-(g/4)*ih; grid+='<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="var(--line)"/><text x="'+(padL-6)+'" y="'+(y+3)+'" text-anchor="end" font-size="9" fill="var(--faint)" font-family="Archivo,sans-serif">'+(g*25)+'%</text>'; }
  const ideal=sx(0)+','+sy(0)+' '+sx(totalDays)+','+sy(100);
  const todayX=sx(nowDay);
  const burn='<svg width="100%" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">'+grid+
    '<polyline points="'+ideal+'" fill="none" stroke="var(--faint)" stroke-width="1.5" stroke-dasharray="4 4"/>'+
    '<line x1="'+todayX+'" y1="'+padT+'" x2="'+todayX+'" y2="'+(padT+ih)+'" stroke="var(--accentLine)" stroke-width="1.5"/>'+
    '<text x="'+todayX+'" y="'+(padT-2)+'" text-anchor="middle" font-size="9" fill="var(--accent)" font-family="Archivo,sans-serif">today</text>'+
    '<polyline points="'+actualPts+'" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>'+
    '<text x="'+(W-padR)+'" y="'+(sy(100)+12)+'" text-anchor="end" font-size="9" fill="var(--faint)" font-family="Archivo,sans-serif">cutoff '+fmtDateShort(end)+'</text>'+
    '</svg>';
  // disposition mix
  const klassCount={}; s.dispositions.forEach(d=>{ klassCount[d.klass]=(klassCount[d.klass]||0)+1; });
  const mix=[['matched','var(--accent)','Matched'],['shortage','var(--danger)','Shortage'],['surplus','var(--gold)','Surplus'],['duplicate-conflict','#caa24a','Duplicate'],['metadata-diff','var(--faint)','Metadata'],['value-change','#b5563f','Value chg']]
    .map(([k,col,lab])=>({value:klassCount[k]||0,color:col,label:lab})).filter(x=>x.value>0);
  // variance by directorate (shortage value)
  const dirVar={}; s.locations.filter(l=>l.type==='directorate').forEach(d=>dirVar[d.id]={name:d.city,v:0});
  s.dispositions.filter(d=>d.klass==='shortage'&&d.status!=='rejected'&&d.asset_id).forEach(d=>{ const a=s.assets.find(x=>x.id===d.asset_id); if(a){ const dir=Sel.loc(a.location_id)?.parent_id; if(dirVar[dir]) dirVar[dir].v+=Math.abs(d.amount); } });
  const varBars=Object.values(dirVar).map(x=>({label:x.name,short:x.name,value:x.v,color:'var(--danger)'}));
  // counted per category
  const catCount={}; s.categories.forEach(cc=>catCount[cc.id]={n:Sel.catName(cc.id),c:0,t:0});
  s.assets.forEach(a=>{ catCount[a.category].t++; if(a.status!=='registered')catCount[a.category].c++; });
  const catBars=Object.values(catCount).map(x=>({label:x.n,short:x.n.split(' ')[0],value:x.c,color:'var(--navy)'}));

  view.innerHTML=
    pageHead('Analytics', 'Live campaign analytics — burn-down to the legal cutoff, disposition mix and variance by location & category.',
      '<span class="chip '+(onTrack?'green':'amber')+'">'+(onTrack?'On track':'Behind pace')+'</span>')+
    '<div class="card mb20"><div class="card-h"><h3>Burn-down to cutoff</h3>'+
      '<span class="muted ui" style="font-size:11.5px">'+curPct+'% counted · projected completion ~day '+Math.round(projDay)+' of '+totalDays+'</span></div>'+
      '<div class="card-b">'+burn+
        '<div class="row gap16 mt8" style="font-family:var(--sans);font-size:11.5px;color:var(--soft)"><span><span style="display:inline-block;width:18px;height:3px;background:var(--accent);vertical-align:middle"></span> Actual</span>'+
        '<span><span style="display:inline-block;width:18px;height:0;border-top:2px dashed var(--faint);vertical-align:middle"></span> Ideal (linear to cutoff)</span></div></div></div>'+
    '<div class="grid" style="grid-template-columns:300px 1fr;align-items:start">'+
      '<div class="card"><div class="card-h"><h3>Disposition mix</h3></div><div class="card-b center">'+
        '<div style="position:relative;display:inline-block">'+svgDonut(mix,150)+
          '<div style="position:absolute;inset:0;display:grid;place-items:center"><div style="text-align:center"><div style="font-family:var(--serif-d);font-size:26px;font-weight:600">'+s.dispositions.length+'</div><div class="muted ui" style="font-size:10px">dispositions</div></div></div></div>'+
        '<div class="mt12" style="text-align:left">'+mix.map(m=>'<div class="row between" style="font-family:var(--sans);font-size:12px;padding:3px 0"><span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:'+m.color+';margin-right:7px"></span>'+esc(m.label)+'</span><b>'+m.value+'</b></div>').join('')+'</div>'+
      '</div></div>'+
      '<div class="grid g2" style="align-items:start">'+
        '<div class="card"><div class="card-h"><h3>Shortage variance by location</h3></div><div class="card-b">'+svgVBars(varBars,{fmt:v=>Math.round(v/1000)+'k'})+'</div></div>'+
        '<div class="card"><div class="card-h"><h3>Counted by category</h3></div><div class="card-b">'+svgVBars(catBars,{})+'</div></div>'+
      '</div>'+
    '</div>'+ disclaimerNote();
}

function loadAudit(showSkel){
  auditState.loading=true; const tok=++auditState.token;
  if(showSkel){ const c=$('#aud-table'); if(c)c.innerHTML=skelTable(auditState.q.pageSize,6); }
  api.listAudit(auditState.q).then(res=>{
    if(tok!==auditState.token)return;
    auditState.result=res; auditState.loading=false;
    const c=$('#aud-table'); if(c){ c.innerHTML=auditTableHtml(res); wireAuditTable(); }
  });
}
function auditTableHtml(res){
  if(res.total===0) return '<div class="tbl-wrap">'+emptyState('shield','No matching entries','Adjust the search or actor filter.')+'</div>';
  let h='<div class="tbl-wrap"><table class="tbl"><thead><tr>'+
    '<th>#</th><th>Timestamp</th><th>Actor</th><th>Action</th><th>Old → New</th><th>Approval</th><th>Hash (chained)</th></tr></thead><tbody>';
  res.items.forEach(r=>{
    h+='<tr><td class="mono" style="font-size:11px;color:var(--faint)">'+(r.seq||'')+'</td>'+
      '<td style="font-size:12.5px;white-space:nowrap">'+fmtDate(r.ts)+'</td>'+
      '<td style="font-size:13px"><div style="font-weight:600">'+esc(r.actor)+'</div><div class="muted ui" style="font-size:10.5px">'+esc(r.role)+'</div></td>'+
      '<td><span class="chip '+auditChipTone(r.action)+'" style="font-size:10px">'+esc(prettyAction(r.action))+'</span>'+
        (r.entity_id&&r.entity_id!=='—'?'<div class="mono" style="font-size:10.5px;color:var(--faint);margin-top:3px">'+esc(r.entity_id)+'</div>':'')+'</td>'+
      '<td style="font-size:12px;max-width:240px"><span class="muted">'+esc(r.old)+'</span> <span style="color:var(--accent)">→</span> '+esc(r.new)+(r.reason?'<div class="muted ui" style="font-size:11px;font-style:italic;margin-top:2px">“'+esc(r.reason)+'”</div>':'')+'</td>'+
      '<td style="font-size:12px">'+(r.approval&&r.approval!=='—'?esc(r.approval):'<span class="muted">—</span>')+'</td>'+
      '<td class="mono" style="font-size:10.5px;color:var(--soft)" title="prev '+esc(r.prevHash||'')+'">'+esc(r.hash||'')+'<div class="muted" style="font-size:9px">↳ corr '+shortId(r.correlation_id)+'</div></td></tr>';
  });
  h+='</tbody></table>';
  const from=(res.page-1)*res.pageSize+1,to=Math.min(res.total,res.page*res.pageSize);
  h+='<div class="tbl-foot"><span>Showing <b>'+from+'–'+to+'</b> of <b>'+res.total+'</b> · newest first</span><div class="pager">'+pagerHtml(res.page,res.pages)+'</div></div></div>';
  return h;
}
function auditChipTone(a){
  if(/CONFLICT|DUPLICATE|METADATA|SURPLUS/.test(a))return 'gold';
  if(/SHORT|REJECT|WRITE/.test(a))return 'red';
  if(/APPROV|MATCH|RESOLVED|CANDIDATE/.test(a))return 'green';
  if(/IMPORT|ASSIGN|CREATED|CONFIG/.test(a))return 'navy';
  return 'grey';
}
function wireAuditTable(){
  $$('#aud-table [data-page]').forEach(b=>b.addEventListener('click',()=>{ const p=parseInt(b.getAttribute('data-page'),10); if(!isNaN(p)){ auditState.q.page=p; loadAudit(true); } }));

function doVerifyAudit(){
  const res=verifyAuditChain(Store.get().audit);
  const box=$('#aud-integrity'); if(!box)return;
  if(res.ok){
    box.innerHTML='<div class="callout accent mb16 fade-in">'+icon('checkCircle')+'<div><b>Integrity verified — chain intact.</b> All '+res.count+' entries hash-link to the previous one; the chain head is <span class="mono">'+res.head+'</span>. Any edit, deletion or re-ordering would break the chain and be detected here.</div></div>';
    toast({type:'ok',title:'Audit chain verified',msg:res.count+' entries · no tampering detected.'});
  }else{
    box.innerHTML='<div class="callout danger mb16 fade-in">'+icon('alert')+'<div><b>Integrity check FAILED at entry #'+(res.broken.index+1)+'</b> ('+esc(prettyAction(res.broken.action))+'). The hash chain is broken — tampering or corruption detected.</div></div>';
    toast({type:'err',title:'Integrity check failed',msg:'Chain broken at #'+(res.broken.index+1)+'.'});
  }
}
function doExportAudit(){

}

async function runAi(question){
  if(aiState.running)return;
  aiState.running=true;
  const host=$('#ai-pipeline');
  host.innerHTML=
    '<div class="card pad fade-in" id="ai-stages">'+
      '<div class="ai-stage" id="ai-s1" style="opacity:.35"><div class="label mb8">'+icon('database','')+' 1 · Context — model sees only the schema</div><div id="ai-s1b"></div></div>'+
      '<div class="divider"></div>'+
      '<div class="ai-stage" id="ai-s2" style="opacity:.35"><div class="label mb8">'+icon('cpu','')+' 2 · Proposed read-only SQL</div><div id="ai-s2b"></div></div>'+
      '<div class="divider"></div>'+
      '<div class="ai-stage" id="ai-s3" style="opacity:.35"><div class="label mb8">'+icon('shield','')+' 3 · Validator gate</div><div id="ai-s3b"></div></div>'+
      '<div class="divider"></div>'+
      '<div class="ai-stage" id="ai-s4" style="opacity:.35"><div class="label mb8">'+icon('barChart','')+' 4 · Result (executed on in-memory data)</div><div id="ai-s4b"></div></div>'+
    '</div>';
  const alive=()=>!!$('#ai-stages');
  const reveal=(id)=>{ const n=$('#'+id); if(n){ n.style.transition='opacity .4s'; n.style.opacity='1'; } };
  const done=()=>{ aiState.running=false; };

  // stage 1: schema
  await sleep(220); if(!alive())return done(); reveal('ai-s1');
  const s1=$('#ai-s1b'); if(s1) s1.innerHTML='<div class="code">'+AI_SCHEMA.map(t=>esc(t)).join('\n')+'</div>'+
    '<div class="muted ui" style="font-size:11.5px;margin-top:8px">No row data is sent to the model — only table & column names.</div>';

  // compute result (read-only; commit deferred so it can\'t wipe the animation)
  const res=await api.runAiQuery(question,{defer:true});
  aiState.last=res;

  // stage 2: sql (typing reveal)
  await sleep(360); if(!alive())return done(); reveal('ai-s2');
  const s2=$('#ai-s2b'); if(s2) await typeInto(s2,'<div class="code" id="ai-sql"></div>', res.sql);

  // stage 3: validations one by one
  await sleep(260); if(!alive())return done(); reveal('ai-s3');
  const vb=$('#ai-s3b'); if(vb){ vb.innerHTML='';
    for(let i=0;i<res.validations.length;i++){
      if(!alive())return done();
      const v=res.validations[i];
      const row=el('div',{class:'row gap8',style:'padding:5px 0;font-size:13px;font-family:var(--sans)'});
      row.innerHTML='<span class="spinner dark"></span><span class="muted">'+esc(v.label)+'</span>';
      vb.appendChild(row);
      await sleep(170);
      row.innerHTML='<span style="color:var(--accent)">'+icon('checkCircle','')+'</span><span>'+esc(v.label)+'</span>';
    }
    vb.insertAdjacentHTML('beforeend','<div class="callout accent mt8" style="font-size:12px">'+icon('shield')+'<div>All checks passed — statement released to a read-only replica connection.</div></div>');
  }

  // log the query now (commits audit + history); set the audit id on the result
  res.auditId=await api.logAiQuery(res.question, res.sql, res.rows.length);

  // stage 4: results (if the animation host still exists; otherwise the re-render already shows it)
  await sleep(300); reveal('ai-s4');
  const s4=$('#ai-s4b'); if(s4){ s4.innerHTML=aiResultTableHtml(res); wireAiResult(); }
  done();
}
function typeInto(container,wrapperHtml,text){
  return new Promise(resolve=>{
    container.innerHTML=wrapperHtml;
    const target=container.querySelector('div');
    let i=0; const chunk=Math.max(2,Math.round(text.length/40));
    (function step(){
      i=Math.min(text.length,i+chunk);
      target.textContent=text.slice(0,i);
      if(i<text.length) setTimeout(step,18); else resolve();
    })();
  });
}
function aiResultHtml(res){
  // re-render of a previously-run query (no animation)

      surplus_category:mob.surplus.category, surplus_value:Number(mob.surplus.value)||0,

    if(!evt.surplus_name||!evt.surplus_value){ toast({type:'err',title:'Missing fields',msg:'Surplus needs a name and estimated value.'}); return; }
  }else{
    const a=mob.captureAsset;
    evt={inventory_no:a.inventory_no, asset_id:a.id, status:mob.status, note:mob.note, photo:mob.photo?'photo':null,
      commission_id:ui.activeCommissionId, actor:mobileActor(), role:ui.role, device:'mobile/'+mobileActor().split(' ')[0].toLowerCase()};
  }
  try{
    const res=await api.captureLocal(evt);
    const pend=Store.get().outbox.length;
    mob.step='choose'; mob.captureAsset=null; mob.note=''; mob.photo=false;

      Store.setUI({mobileTab:'sync'});

    }else{

async function toggleOffline(){
  const off=Store.get().ui.offline;
  Store.setUI({offline:!off});
  if(off){ // going ONLINE
    const pend=Store.get().outbox.length;
    if(pend){ toast({type:'info',title:'Back online',msg:'Auto-syncing '+pend+' queued event(s)…'}); setTimeout(()=>mobileSync({drop:mob.drop}),450); }
    else toast({type:'ok',title:'Back online',msg:'No pending events.'});
  }else{
    toast({type:'warn',title:'Offline mode',msg:'Captures will queue locally until you reconnect.'});
  }
}
async function mobileSync(opts){
  opts=opts||{};
  const outbox=Store.get().outbox.slice();
  if(Store.get().ui.offline){ toast({type:'warn',msg:'You are offline — toggle online to sync.'}); return; }
  if(!outbox.length){ toast({type:'info',msg:'Nothing to sync.'}); return; }
  mob.syncing=true; Store.setUI({mobileTab:'sync'}); App.render();
  const setStage=(txt,detail,pct)=>{ const a=$('#m-sync-stage'),b=$('#m-sync-detail'),c=$('#m-sync-bar'); if(a)a.textContent=txt; if(b&&detail)b.textContent=detail; if(c)c.style.width=pct+'%'; };
  await sleep(420); setStage('Pushing '+outbox.length+' event(s)…','POST /sync/batch · '+outbox.length+' items',32);
  await sleep(520); setStage('Server reconciling…','classify → disposition',64);
  const res=await api.syncBatch(outbox,{simulateDrop:opts.drop});
  await api.clearAckedFromOutbox(res.acks.map(a=>a.id));
  setStage(res.dropped?'Connection dropped':'ACK received', res.dropped?'partial · '+res.acks.length+'/'+res.total:'committed · '+res.acks.length+' acked', res.dropped?72:100);
  await sleep(620);
  mob.drop=false; mob.syncing=false; App.render();
  // toasts
  if(res.duplicates>0) toast({type:'info',title:'Idempotent sync',msg:res.duplicates+' event(s) already received — returned prior ACK, no duplicates.'});
  if(res.dropped){
    toast({type:'warn',title:'Network dropped mid-sync',msg:res.lostAcks+' event(s) committed server-side but un-ACKed — kept in outbox. Sync again to resume safely.'});
  }else{
    const sum=res.summary; const parts=Object.keys(sum).map(k=>sum[k]+' '+k);
    if(res.newDisps.length) toast({type:'ok',title:'Synced',msg:parts.join(' · ')+'. Reconciled & routed.'});
    else if(res.duplicates===0) toast({type:'ok',title:'Synced',msg:'Outbox cleared.'});
  }
}

      body:'Create commissions and assign each a worklist by location. Members then capture on the mobile app.',
      why:'Work is scoped per commission and per role — the basis of separation of duties.' },
    { title:'Full visibility', role:'Tenant Admin', route:'#/dashboard', target:()=>'.page-head',
      body:'Admin sees the whole picture — progress, exceptions, ERP return and audit. Other roles see only what they need.',
      why:'Least-privilege access by design.' }
  ]; }
  function buildPresidentTour(){ return [
    { title:'Commission President — your commission', role:'Commission President', route:'#/commissions', target:()=>'.card',
      body:'You run a field commission. Here you see your members and worklist progress and assign assets by location.',
      why:'You own the physical verification for your region.' },
    { title:'Conflict Inbox', role:'Commission President', route:'#/conflicts', target:()=>'.card',
      body:'When the field produces a conflict — a duplicate scan or stale master data — it lands here with both versions and full context (who, when, photo).',
      why:'The system never picks a winner; a human decides.' },
    { title:'Resolve a conflict', role:'Commission President', route:'#/conflicts', target:()=>'[data-resolve]',
      action: async()=>{ const d=Sel.conflicts()[0]; if(d) await api.resolveConflict(d.id,'keep-first','Role demo: confirmed the first count is authoritative.'); },
      body:'Choose a decision and a reason. The conflict clears, an audit row is appended, and the dashboard updates instantly.',
      why:'Every resolution is recorded — fully traceable.' },
    { title:'Campaign progress', role:'Commission President', route:'#/dashboard', target:()=>'.page-head',
      body:'Track your campaign against the legal cutoff and see outstanding exceptions at a glance.',
      why:'You always know where the count stands.' }
  ]; }
  function buildMemberTour(){ return [
    { title:'Commission Member — field app', surface:'mobile', role:'Commission Member', target:()=>'#phone',
      body:'Members verify physical reality in the field, often with no signal at all. Everything is captured locally first.',
      why:'Offline-first: each capture is an immutable event (UUID + timestamp + content hash).' },
    { title:'Your worklist', surface:'mobile', role:'Commission Member', action: async()=>{ Store.setUI({mobileTab:'lists'}); },
      target:()=>'#m-body',
      body:'Your assigned assets for the active commission. Tap one to capture, or use Scan, manual lookup, or add-unregistered.',
      why:'Three equal capture paths — all produce the same immutable event.' },
    { title:'Capture offline', surface:'mobile', role:'Commission Member',
      action: async()=>{ Store.setUI({offline:true, mobileTab:'sync'}); await tourCapture(Store.get().demo.foundAssetId,'found'); },
      target:()=>'#m-body',
      body:'We toggled the phone OFFLINE and captured an asset as “found”. It queues locally with a live pending count.',
      why:'No network needed; the outbox holds it until the server confirms it.' },
    { title:'Capture a shortage', surface:'mobile', role:'Commission Member',
      action: async()=>{ await tourCapture(Store.get().demo.shortAssetId,'shortage'); },
      target:()=>'#m-body',
      body:'A booked asset that cannot be found is captured as a shortage — a financial exception.',
      why:'It will be gated by a human review before anything can post.' },
    { title:'Go online & sync', surface:'mobile', role:'Commission Member',
      action: async()=>{ Store.setUI({offline:false}); await mobileSync({drop:false}); },
      target:()=>'#m-body',
      body:'Back online, the outbox syncs idempotently. Captures now flow to the web portal and reconcile automatically.',
      why:'Re-sending is always safe — no loss, no duplicates.' }
  ]; }
  function buildAccountingTour(){ return [
    { title:'Accounting — the review gate', role:'Accounting', route:'#/review', target:()=>'.card',
      body:'Financial exceptions — shortages, surpluses, value changes — queue here. This is the only path from a field finding to a posting candidate.',
      why:'Nothing reaches SAP without approval, and whoever captured an item cannot approve it (separation of duties).' },
    { title:'Approve an exception', role:'Accounting', route:'#/review', target:()=>'[data-approve]',
      action: async()=>{ const d=Sel.reviews().filter(x=>canApproveReview(x).ok)[0]; if(d) await api.approve(d.id,'approve','Role demo: confirmed with custodian; relocation ruled out.'); },
      body:'Approve with a reason. The exception becomes a posting candidate — staged, but still not posted.',
      why:'A deliberate, audited human decision.' },
    { title:'Prepare the candidate', role:'Accounting', route:'#/sync', target:()=>'#prep-btn',
      action: async()=>{ await api.prepareCandidates(); },
      body:'Prepare the posting candidate — the exact payload that would go to SAP. Nothing is posted yet.',
      why:'The platform’s most autonomous step is “candidate”.' },
    { title:'Release to SAP', role:'Accounting', route:'#/sync', target:()=>'#postings',
      action: async()=>{ const p=Store.get().postings.filter(x=>!x.posted).sort((a,b)=>b.ts-a.ts)[0]; if(p) await api.sapPost(p.id); },
      body:'You click Release — BAPI documents post to the simulated SAP and real document numbers (BELNR) come back.',
      why:'Shortage → retirement (ABAVN), surplus → acquisition (ABZON) — all human-released.' },
    { title:'Confirmed in SAP', role:'Accounting', route:'#/sap', target:()=>'.tbl-wrap',
      body:'The posted documents now appear in the SAP console with the full RFC/BAPI interface log.',
      why:'The round-trip is closed and SAP stayed the system of record.' }
  ]; }
  function buildAuditorTour(){ return [
    { title:'Auditor — the audit log', role:'Auditor', route:'#/audit', target:()=>'.tbl-wrap',
      body:'Every meaningful action is here, append-only and read-only — capture, reconcile, resolve, approve, post-to-SAP — linked by correlation IDs.',
      why:'Admin actions are logged too. Nothing can be edited or deleted in the UI.' },
    { title:'Filter & trace', role:'Auditor', route:'#/audit', target:()=>'.toolbar',
      body:'Search by actor, action, asset or correlation ID to trace a single item end-to-end.',
      why:'An unbroken chain from field event to SAP document.' },
    { title:'AI insights (read-only)', role:'Auditor', route:'#/ai', target:()=>'#ai-pipeline',
      action: async()=>{ await sleep(120); try{ await runAi(AI_PRESETS[0]); }catch(e){} },
      body:'Ask in natural language. The model sees only the schema, proposes read-only SQL, a validator gates it, and the result is logged.',
      why:'It can surface insight and anomalies, but can never write or post.' },
    { title:'Anomaly signals', role:'Auditor', route:'#/ai', target:()=>'#ai-anom',
      body:'Explainable statistical flags with stated reasons — signals, never verdicts.',
      why:'They focus the audit; the decision stays human.' },
    { title:'Read-only SAP view', role:'Auditor', route:'#/sap', target:()=>'.tbl-wrap',
      body:'Inspect the SAP document log and interface activity — with no ability to change anything.',
      why:'Full visibility, zero write access.' }
  ]; }

  const TOURS=[
    {key:'full',       label:'Full end-to-end walkthrough', role:null,                  tone:'navy',   icon:'play',       desc:'The complete loop across every role (~20 steps).', build:buildSteps},
    {key:'admin',      label:'Tenant Admin',                role:'Tenant Admin',         tone:'navy',   icon:'settings',   desc:'Setup, master import, field mapping, commissions.', build:buildAdminTour},
    {key:'president',  label:'Commission President',        role:'Commission President', tone:'gold',   icon:'users',      desc:'Worklists, conflict inbox, resolving conflicts.',   build:buildPresidentTour},
    {key:'member',     label:'Commission Member',           role:'Commission Member',    tone:'accent', icon:'smartphone', desc:'Mobile field app — offline capture & sync.',         build:buildMemberTour},
    {key:'accounting', label:'Accounting',                  role:'Accounting',           tone:'gold',   icon:'scale',      desc:'Review gate, approvals, release to SAP.',            build:buildAccountingTour},
    {key:'auditor',    label:'Auditor',                     role:'Auditor',              tone:'navy',   icon:'shield',     desc:'Audit log, AI insights, anomalies, traceability.',   build:buildAuditorTour}
  ];

  function host(){ return $('#tour-host'); }
  function ensureDom(){
    host().innerHTML='<div class="tour-dim" id="tour-dim" style="position:absolute;inset:0;background:rgba(12,22,30,.5);pointer-events:none;transition:opacity .3s"></div>'+
      '<div class="tour-ring" id="tour-ring" style="opacity:0"></div>'+
      '<div class="tour-pop" id="tour-pop"></div>';
    host().classList.add('show');
  }
  async function go(n){
    if(n<0||n>=steps.length){ stop(); return; }
    i=n; const step=steps[i]; working=true;
    if(step.role) Store.setUI({role:step.role}, true);
    if(step.surface) Store.setUI({surface:step.surface}, true);
    if(step.route && Store.get().ui.surface==='web'){ if(location.hash!==step.route) location.hash=step.route; else Store.setUI({route:step.route}, true); }
    App.render();
    renderPop(step, true);
    await sleep(step.action?200:260);
    if(step.action){ try{ await step.action(); }catch(e){ console.warn('tour action',e); } App.render(); await sleep(280); }
    working=false;
    renderPop(step, false);
    reposition();
  }
  function renderPop(step, busy){
    const pop=$('#tour-pop'); if(!pop)return;
    pop.innerHTML=
      '<div class="tp-h"><span class="tp-step">'+esc(tourLabel)+'</span>'+
        '<span class="row gap6"><button class="icon-x" id="tp-menu" title="All demos" aria-label="All demos">'+icon('list')+'</button>'+
        '<button class="icon-x" id="tp-x" aria-label="Exit tour">'+icon('x')+'</button></span></div>'+
      '<div class="tp-b"><h4>'+step.title+'</h4><p>'+step.body+'</p>'+
        '<div class="tp-why"><b>Why it matters</b><br>'+step.why+'</div></div>'+
      '<div class="tp-f"><span class="tp-prog">Step '+(i+1)+' of '+steps.length+'</span>'+
        '<span class="row gap8">'+
          (i>0?'<button class="btn ghost sm" id="tp-back">Back</button>':'')+
          '<button class="btn primary sm" id="tp-next" '+(busy?'disabled':'')+'>'+(busy?'<span class="spinner"></span>Working…':(i===steps.length-1?'Finish':'Next'))+(busy?'':' '+iconInline('arrowRight'))+'</button>'+
        '</span></div>';
    $('#tp-x').addEventListener('click',stop);
    const mn=$('#tp-menu'); if(mn) mn.addEventListener('click',()=>{ stop(); choose(); });
    const nb=$('#tp-next'); if(nb&&!busy) nb.addEventListener('click',()=>{ if(working)return; go(i+1); });
    const bb=$('#tp-back'); if(bb) bb.addEventListener('click',()=>{ if(working)return; go(i-1); });
  }
  function iconInline(n){ return icon(n,'').replace('width:15px','width:13px'); }
  function reposition(){
    if(!active)return;
    const step=steps[i]; const ring=$('#tour-ring'), pop=$('#tour-pop'), dim=$('#tour-dim');
    if(!ring||!pop)return;
    let target=null;
    if(step && step.target){ const sel=step.target(); if(sel){ try{ target=document.querySelector(sel); }catch(e){} } }
    const vw=window.innerWidth, vh=window.innerHeight;
    if(target){
      const r=target.getBoundingClientRect();
      const pad=8;
      ring.style.opacity='1';
      ring.style.left=(r.left-pad)+'px'; ring.style.top=(r.top-pad)+'px';
      ring.style.width=(r.width+pad*2)+'px'; ring.style.height=(r.height+pad*2)+'px';
      if(dim) dim.style.opacity='0';
      // place pop: prefer below, else above, else right
      const pw=340, ph=pop.offsetHeight||230;
      let left=clamp(r.left, 12, vw-pw-12);
      let top;
      if(r.bottom+ph+18 < vh){ top=r.bottom+14; }
      else if(r.top-ph-18 > 0){ top=r.top-ph-14; }
      else { top=clamp(vh-ph-12,12,vh-ph-12); left=clamp(r.right+14,12,vw-pw-12); }
      pop.style.left=left+'px'; pop.style.top=top+'px';
    }else{
      ring.style.opacity='0';
      if(dim) dim.style.opacity='1';
      const pw=340, ph=pop.offsetHeight||230;
      pop.style.left=clamp((vw-pw)/2,12,vw-pw-12)+'px';
      pop.style.top=clamp((vh-ph)/2,12,vh-ph-12)+'px';
    }
  }
  function start(key){
    const t = TOURS.find(x=>x.key===key) || TOURS[0];
    if(active) stop();
    active=true; i=0; steps=t.build(); tourLabel=t.label;
    if(t.role) Store.setUI({role:t.role}, true);
    Store.setUI({tourActive:true}, true); ensureDom(); go(0);
  }
  function choose(){
    if(active) stop();
    const picks=TOURS.map(t=>'<button class="tour-pick" data-tour="'+t.key+'">'+
      '<span class="tp-ic '+t.tone+'">'+icon(t.icon)+'</span>'+
      '<span class="flex1"><span class="tp-name">'+t.label+'</span><span class="tp-desc">'+esc(t.desc)+'</span></span>'+
      iconInline('chevronRight')+'</button>').join('');
    openModal({
      title:'Guided demo',
      body:'<p class="soft" style="font-size:13.5px;margin:0 0 12px">Pick a walkthrough. Each one switches to the right role and narrates what matters. Free-click exploration keeps working throughout.</p>'+
        '<div class="tour-picks">'+picks+'</div>',
      footer:'<button class="btn" data-modal-close>Close</button>',
      onMount(m){ $$('[data-tour]',m).forEach(b=>b.addEventListener('click',()=>{ const k=b.getAttribute('data-tour'); closeModal(); setTimeout(()=>start(k),60); })); }
    });
  }
  function stop(){ active=false; Store.setUI({tourActive:false}, true); const h=host(); h.classList.remove('show'); h.innerHTML=''; }
  window.addEventListener('resize',()=>{ if(active) reposition(); });
  window.addEventListener('scroll',()=>{ if(active) reposition(); }, true);
  return {start, stop, choose, reposition, get active(){return active;}};
})();

/* ===========================================================================
   MODULE: bootstrap
   =========================================================================== */
function boot(){
  try{
    Store.init();
    // reset transient/session-only flags
    Store.get().ui.tourActive=false;
    // sync router truth: URL hash wins, else last saved route, else dashboard
    const saved=Store.get().ui.route;
    const initial=location.hash || saved || '#/dashboard';
    if(location.hash!==initial){ location.hash=initial; }
    Store.get().ui.route=initial;
    window.addEventListener('hashchange', onHashChange);
    Store.subscribe(scheduleRender);
    App.render();
    // greeting toast
    setTimeout(()=>toast({type:'info', title:'Interactive prototype', msg:'Simulated backend & data — no live SAP/server. Try “Guided demo”.', duration:5200}),600);
  }catch(e){
    console.error('boot error', e);
    const r=document.getElementById('root');
    if(r) r.innerHTML='<div style="padding:40px;font-family:monospace;white-space:pre-wrap">Boot error:\n'+esc(e&&e.stack||e)+'</div>';
  }
}
document.addEventListener('DOMContentLoaded', boot);
</script>
</body>
</html>
