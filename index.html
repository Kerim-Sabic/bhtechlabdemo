<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horalix — Inventory Platform (Interactive Prototype)</title>
<style>
/* ============================================================
   HORALIX INVENTORY PLATFORM — Design System
   Premium editorial SaaS. Warm paper, hairline borders, soft shadows.
   ============================================================ */
:root{
  --ink:#1A1F28; --soft:#434C59; --faint:#828B97;
  --paper:#FCFBF8; --paper2:#F5F2EC; --line:#EAE6DD;
  --navy:#12273F; --navy2:#244563;
  --accent:#0C7A63; --accentLine:#A8D2C6; --accentSoft:#EAF4F0;
  --gold:#A87C32; --goldSoft:#F6EEDD;
  --danger:#A03E30; --dangerSoft:#F8EBE7;
  --warn:#83661C; --warnSoft:#F8F1DC;
  --shadow-sm:0 4px 14px rgba(18,39,63,.06);
  --shadow-md:0 8px 24px rgba(18,39,63,.08);
  --shadow-lg:0 18px 44px rgba(18,39,63,.12);
  --r-sm:8px; --r:12px; --r-lg:16px;
  --serif-d:"Fraunces",Georgia,"Times New Roman",serif;
  --serif-b:"Newsreader",Georgia,"Times New Roman",serif;
  --sans:"Archivo",system-ui,-apple-system,"Segoe UI",sans-serif;
  --mono:"IBM Plex Mono",ui-monospace,"SF Mono","Cascadia Code",Consolas,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--serif-b);
  font-size:16px; line-height:1.6;
  color:var(--ink);
  background:var(--paper);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
h1,h2,h3,h4{font-family:var(--serif-d);font-weight:600;letter-spacing:-.01em;margin:0;color:var(--ink);line-height:1.2}
h1{font-size:30px} h2{font-size:22px} h3{font-size:18px} h4{font-size:15px}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
button{font-family:var(--sans);cursor:pointer}
input,select,textarea{font-family:var(--serif-b);font-size:15px}
code,.mono{font-family:var(--mono)}
::selection{background:var(--accentSoft)}
/* ---- icon sizing system: every icon() svg carries .ic; context rules below still win ---- */
svg.ic{width:1.05em;height:1.05em;flex:0 0 auto;vertical-align:-.16em;stroke-width:2}
svg.ic-sm{width:14px;height:14px}
svg.ic-md{width:18px;height:18px}
svg.ic-lg{width:24px;height:24px}
svg.ic-xl{width:30px;height:30px;stroke-width:1.7}
svg.ic-2xl{width:40px;height:40px;stroke-width:1.6}
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-thumb{background:#d9d3c6;border-radius:8px;border:3px solid var(--paper)}
::-webkit-scrollbar-track{background:transparent}

/* ---- Typography helpers ---- */
.kicker{font-family:var(--sans);text-transform:uppercase;letter-spacing:.14em;font-size:11px;font-weight:600;color:var(--faint)}
.ui{font-family:var(--sans)}
.label{font-family:var(--sans);text-transform:uppercase;letter-spacing:.08em;font-size:11px;font-weight:600;color:var(--soft)}
.muted{color:var(--faint)} .soft{color:var(--soft)}
.tnum{font-variant-numeric:tabular-nums}

/* ---- App layout ---- */
#root{min-height:100vh;display:flex;flex-direction:column}
.topbar{
  position:sticky;top:0;z-index:40;
  display:flex;align-items:center;gap:18px;
  height:58px;padding:0 20px;
  background:rgba(252,251,248,.86);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}
.topbar .brand{display:flex;align-items:center;gap:10px;margin-right:6px}
.topbar .sep{width:1px;height:26px;background:var(--line)}
.topbar .spacer{flex:1}
.wordmark{font-family:var(--sans);font-weight:700;letter-spacing:.16em;font-size:14px;color:var(--navy)}
.mark{width:26px;height:26px;border-radius:7px;background:var(--accent);display:grid;place-items:center;flex:0 0 auto;box-shadow:inset 0 0 0 2px rgba(255,255,255,.0)}
.mark i{display:block;width:11px;height:11px;border:2px solid #fff;border-radius:3px}

/* segmented switcher */
.seg{display:inline-flex;background:var(--paper2);border:1px solid var(--line);border-radius:9px;padding:3px;gap:2px}
.seg button{border:0;background:transparent;color:var(--soft);font-size:12px;font-weight:600;letter-spacing:.02em;padding:6px 12px;border-radius:6px;transition:.15s;white-space:nowrap}
.seg button.on{background:#fff;color:var(--ink);box-shadow:var(--shadow-sm)}
.seg button:hover:not(.on){color:var(--ink)}
.switch-wrap{display:flex;align-items:center;gap:9px}
.switch-wrap .label{font-size:10px}

/* role select */
.role-select{position:relative}
.role-select select{
  appearance:none;-webkit-appearance:none;
  background:var(--paper2);border:1px solid var(--line);border-radius:9px;
  padding:7px 30px 7px 12px;font-family:var(--sans);font-size:12px;font-weight:600;color:var(--ink);
}
.role-select::after{content:"";position:absolute;right:11px;top:50%;width:7px;height:7px;border-right:2px solid var(--soft);border-bottom:2px solid var(--soft);transform:translateY(-70%) rotate(45deg);pointer-events:none}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:7px;font-family:var(--sans);font-weight:600;font-size:13px;letter-spacing:.01em;
  border:1px solid var(--line);background:#fff;color:var(--ink);padding:8px 14px;border-radius:9px;transition:.15s;line-height:1}
.btn:hover{border-color:#d8d2c6;box-shadow:var(--shadow-sm)}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.5;cursor:not-allowed;box-shadow:none}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:#0a6b56;border-color:#0a6b56}
.btn.navy{background:var(--navy);border-color:var(--navy);color:#fff}
.btn.navy:hover{background:#1a3450}
.btn.ghost{background:transparent;border-color:transparent;color:var(--soft)}
.btn.ghost:hover{background:var(--paper2);border-color:var(--line)}
.btn.danger{background:var(--danger);border-color:var(--danger);color:#fff}
.btn.danger:hover{background:#8d3527}
.btn.sm{padding:6px 10px;font-size:12px}
.btn.xs{padding:4px 8px;font-size:11px;border-radius:7px}
.btn.block{width:100%;justify-content:center}
.btn svg{width:15px;height:15px}

/* topbar controls: command hint, icon buttons, avatar, user chip */
.kbd-hint{display:inline-flex;align-items:center;gap:8px;background:var(--paper2);border:1px solid var(--line);border-radius:9px;padding:6px 10px;color:var(--faint);font-family:var(--sans);font-size:12px;font-weight:500;cursor:pointer;transition:.13s}
.kbd-hint:hover{border-color:#d8d2c6;color:var(--soft)} .kbd-hint svg{width:14px;height:14px}
.kbd-hint kbd{font-family:var(--sans);font-size:10px;background:#fff;border:1px solid var(--line);border-radius:5px;padding:1px 5px;color:var(--soft)}
@media(max-width:1180px){.kbd-hint span{display:none}}
.icon-btn{position:relative;width:36px;height:36px;border-radius:9px;border:1px solid var(--line);background:#fff;color:var(--soft);display:grid;place-items:center;cursor:pointer;transition:.13s}
.icon-btn:hover{border-color:#d8d2c6;color:var(--ink)} .icon-btn svg{width:17px;height:17px}
.bell-dot{position:absolute;top:-5px;right:-5px;min-width:16px;height:16px;padding:0 4px;border-radius:9px;background:var(--danger);color:#fff;font-family:var(--sans);font-size:10px;font-weight:700;display:grid;place-items:center;border:2px solid var(--paper)}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--navy);color:#fff;font-family:var(--sans);font-weight:700;font-size:12px;display:grid;place-items:center;flex:0 0 auto;letter-spacing:.02em}
.avatar.sm{width:26px;height:26px;font-size:10.5px} .avatar.lg{width:42px;height:42px;font-size:15px}
.user-chip{display:inline-flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:4px 9px 4px 5px;cursor:pointer;transition:.13s}
.user-chip:hover{border-color:#d8d2c6;box-shadow:var(--shadow-sm)} .user-chip svg{color:var(--faint)}
.uc-meta{display:flex;flex-direction:column;line-height:1.15;text-align:left}
.uc-name{font-family:var(--sans);font-weight:700;font-size:12.5px;color:var(--ink)}
.uc-role{font-family:var(--sans);font-size:10.5px;color:var(--faint)}
@media(max-width:1080px){.uc-meta{display:none}}
/* popover */
.popover{position:fixed;z-index:78;min-width:300px;max-width:340px;background:var(--paper);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow-lg);padding:7px;animation:pop .16s cubic-bezier(.2,.8,.2,1)}
.pop-h{display:flex;align-items:center;justify-content:space-between;padding:7px 9px 9px;font-family:var(--sans);font-size:12px;font-weight:700;color:var(--soft);text-transform:uppercase;letter-spacing:.05em}
.pop-item{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:transparent;border:0;border-radius:9px;padding:9px 9px;cursor:pointer;font-family:var(--sans);color:var(--soft);transition:.1s}
.pop-item:hover{background:var(--paper2);color:var(--ink)} .pop-item.sm{padding:7px 9px}
.pop-ic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex:0 0 auto;background:var(--paper2);color:var(--soft)}
.pop-ic svg{width:15px;height:15px}
.pop-ic.gold{background:var(--goldSoft);color:var(--gold)} .pop-ic.navy{background:#e7edf3;color:var(--navy)} .pop-ic.green{background:var(--accentSoft);color:var(--accent)} .pop-ic.grey{background:var(--paper2);color:var(--soft)}
.pi-t{display:block;font-size:13px;font-weight:600;color:var(--ink)} .pi-s{display:block;font-size:11.5px;color:var(--faint)}
.pop-empty{display:flex;flex-direction:column;align-items:center;gap:8px;padding:26px 16px;color:var(--faint);font-family:var(--sans);font-size:13px}
.pop-empty svg{width:26px;height:26px;color:var(--accentLine)}
.pop-user{display:flex;align-items:center;gap:11px;padding:9px 9px 11px}
.pu-name{font-family:var(--sans);font-weight:700;font-size:14px;color:var(--ink)} .pu-title{font-family:var(--sans);font-size:11.5px;color:var(--faint)}
.pop-sep{height:1px;background:var(--line);margin:5px 2px}
.pop-lbl{font-family:var(--sans);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);padding:5px 10px 6px}
.pop-hint{display:flex;align-items:flex-start;gap:6px;font-family:var(--sans);font-size:11px;color:var(--faint);padding:6px 10px 4px;line-height:1.4} .pop-hint svg{margin-top:1px;flex:0 0 auto}
.tenant-chip{display:inline-flex;align-items:center;gap:5px;background:transparent;border:1px solid transparent;border-radius:9px;padding:5px 9px;font-family:var(--sans);font-size:12.5px;font-weight:600;color:var(--soft);cursor:pointer;transition:.13s}
.tenant-chip:hover{background:var(--paper2);border-color:var(--line);color:var(--ink)} .tenant-chip svg{color:var(--faint)}
.lang-pick{flex:1;border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 10px;font-family:var(--sans);font-size:12.5px;font-weight:600;color:var(--soft);cursor:pointer;transition:.12s}
.lang-pick:hover{border-color:#d8d2c6;color:var(--ink)} .lang-pick.on{background:var(--accentSoft);border-color:var(--accentLine);color:#0a5e4c}
/* command palette */
.cmdk{margin:-4px}
.cmdk-in{display:flex;align-items:center;gap:10px;padding:6px 6px 14px;border-bottom:1px solid var(--line)}
.cmdk-in svg{width:18px;height:18px;color:var(--faint)}
.cmdk-in input{flex:1;border:0;background:transparent;font-size:17px;font-family:var(--serif-b);color:var(--ink);outline:none}
.cmdk-list{max-height:340px;overflow:auto;padding:8px 0 4px}
.cmdk-item{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:transparent;border:0;border-radius:9px;padding:9px 10px;cursor:pointer;font-family:var(--sans);font-size:13.5px;color:var(--soft)}
.cmdk-item.on,.cmdk-item:hover{background:var(--accentSoft);color:var(--ink)}
.cmdk-item kbd{font-family:var(--sans);font-size:10px;background:#fff;border:1px solid var(--line);border-radius:5px;padding:1px 6px;color:var(--soft)}
.cmdk-foot{border-top:1px solid var(--line);padding:9px 4px 0;font-family:var(--sans);font-size:11px;color:var(--faint)}
.cmdk-foot kbd{font-size:10px;background:var(--paper2);border:1px solid var(--line);border-radius:4px;padding:0 4px;margin:0 1px}
/* login */
.login-stage{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;background:radial-gradient(800px 460px at 50% -8%, #eef4f1 0%, transparent 60%), radial-gradient(700px 460px at 90% 110%, #f3eee4 0%, transparent 55%), var(--paper)}
.login-card{width:min(440px,100%);background:#fff;border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow-lg);padding:34px 32px}
.login-brand{display:flex;align-items:center;gap:11px}
.login-users{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.login-user{display:flex;align-items:center;gap:12px;width:100%;border:1px solid var(--line);background:#fff;border-radius:12px;padding:11px 13px;cursor:pointer;transition:.14s}
.login-user:hover{border-color:var(--accent);background:var(--accentSoft);transform:translateX(2px)}
.lu-name{display:block;font-family:var(--sans);font-weight:700;font-size:14px;color:var(--ink)}
.lu-role{display:block;font-family:var(--sans);font-size:12px;color:var(--faint)}
.lu-go{color:var(--faint);display:grid;place-items:center} .login-user:hover .lu-go{color:var(--accent)}
.login-foot{margin-top:20px;color:var(--faint);font-family:var(--sans);font-size:11.5px}

/* shell */
.shell{flex:1;display:grid;grid-template-columns:236px 1fr;min-height:0}
.sidebar{border-right:1px solid var(--line);background:linear-gradient(180deg,#fbf9f4,#f7f3ec);padding:16px 12px;display:flex;flex-direction:column;gap:3px;position:sticky;top:58px;height:calc(100vh - 58px);overflow-y:auto}
.side-section{font-family:var(--sans);text-transform:uppercase;letter-spacing:.12em;font-size:10px;font-weight:700;color:var(--faint);padding:14px 12px 6px}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;font-family:var(--sans);font-size:13.5px;font-weight:500;color:var(--soft);transition:.13s;cursor:pointer;border:1px solid transparent;position:relative}
.nav-item:hover{background:#fff;color:var(--ink)}
.nav-item.on{background:#fff;color:var(--ink);font-weight:600;box-shadow:var(--shadow-sm);border-color:var(--line)}
.nav-item.on::before{content:"";position:absolute;left:0;top:9px;bottom:9px;width:3px;border-radius:3px;background:var(--accent)}
.nav-item .ico{width:17px;height:17px;flex:0 0 auto;color:currentColor;opacity:.85}
.nav-item .ico svg{width:17px;height:17px;display:block}
.nav-item .badge{margin-left:auto}
.nav-item.locked{opacity:.52}
.nav-item.locked:hover{background:transparent;color:var(--soft)}

.main{min-width:0;display:flex;flex-direction:column}
.view{flex:1;padding:26px 34px 40px;max-width:1240px;width:100%;margin:0 auto;min-height:0}
.footer{border-top:1px solid var(--line);padding:11px 34px;color:var(--faint);font-size:12px;font-family:var(--sans);display:flex;align-items:center;gap:10px;background:var(--paper)}
.footer .dot{width:5px;height:5px;border-radius:50%;background:var(--gold)}

/* page header */
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:22px;flex-wrap:wrap}
.page-head .ttl h1{margin-bottom:4px}
.page-head .ttl p{margin:0;color:var(--faint);font-size:14.5px}
.page-actions{display:flex;gap:9px;align-items:center;flex-wrap:wrap}

/* cards */
.card{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow-sm)}
.card.pad{padding:20px}
.card-h{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 20px;border-bottom:1px solid var(--line)}
.card-h h3{font-size:16px}
.card-b{padding:18px 20px}
.grid{display:grid;gap:18px}
.g2{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:repeat(3,1fr)} .g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:1100px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}

/* KPI */
.kpi{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow-sm)}
.kpi .k-lab{font-family:var(--sans);text-transform:uppercase;letter-spacing:.1em;font-size:10.5px;font-weight:700;color:var(--faint)}
.kpi .k-val{font-family:var(--serif-d);font-size:30px;font-weight:600;margin-top:7px;line-height:1;font-variant-numeric:tabular-nums}
.kpi .k-sub{font-size:12.5px;color:var(--faint);font-family:var(--sans);margin-top:6px}
.kpi.accent{border-left:3px solid var(--accent)} .kpi.danger{border-left:3px solid var(--danger)}
.kpi.gold{border-left:3px solid var(--gold)} .kpi.navy{border-left:3px solid var(--navy)}
.statline{display:flex;flex-direction:column}
.stat-row{display:flex;align-items:center;gap:11px;padding:8px 0;border-bottom:1px solid var(--line)}
.stat-row:last-child{border-bottom:0}
.stat-ic{width:28px;height:28px;border-radius:9px;display:grid;place-items:center;flex:0 0 auto}
.stat-ic svg{width:15px;height:15px}
.stat-ic.green{background:var(--accentSoft);color:var(--accent)} .stat-ic.gold{background:var(--goldSoft);color:var(--gold)}
.stat-ic.amber{background:var(--warnSoft);color:var(--warn)} .stat-ic.navy{background:#e7edf3;color:var(--navy)}
.stat-lab{flex:1;font-size:13px;color:var(--soft);font-family:var(--sans)}
.stat-val{font-size:15px;color:var(--ink);font-weight:700;font-family:var(--sans)}
.kpi-ic{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;background:var(--paper2);color:var(--soft);flex:0 0 auto}
.kpi-ic svg{width:17px;height:17px;stroke-width:1.9}
.kpi.accent .kpi-ic{background:var(--accentSoft);color:var(--accent)} .kpi.danger .kpi-ic{background:var(--dangerSoft);color:var(--danger)}
.kpi.gold .kpi-ic{background:var(--goldSoft);color:var(--gold)} .kpi.navy .kpi-ic{background:#e7edf3;color:var(--navy)}
.sap-dir{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;flex:0 0 auto}
.sap-dir svg{width:13px;height:13px}
.sap-dir.in{background:var(--accentSoft);color:var(--accent)} .sap-dir.out{background:#e7edf3;color:var(--navy)}
.task-card{display:flex;flex-direction:column;align-items:flex-start;text-align:left;border:1px solid var(--line);background:var(--paper2);border-radius:12px;padding:14px;cursor:pointer;transition:.14s}
.task-card:hover{border-color:var(--accentLine);background:#fff;box-shadow:var(--shadow-sm)}
.task-ic{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;margin-bottom:10px}
.task-ic svg{width:17px;height:17px}
.task-ic.navy{background:#e7edf3;color:var(--navy)} .task-ic.gold{background:var(--goldSoft);color:var(--gold)} .task-ic.green{background:var(--accentSoft);color:var(--accent)} .task-ic.accent{background:var(--accentSoft);color:var(--accent)}
.task-t{font-family:var(--sans);font-weight:700;font-size:13.5px;color:var(--ink)}
.task-d{font-family:var(--sans);font-size:12px;color:var(--faint);margin-top:2px}
.task-cta{display:flex;align-items:center;gap:5px;font-family:var(--sans);font-size:12px;font-weight:600;color:var(--accent);margin-top:11px}
table.tbl.rbac td,table.tbl.rbac th{border-right:1px solid var(--line)}
table.tbl.rbac td:last-child,table.tbl.rbac th:last-child{border-right:0}
.rbac-yes{color:var(--accent);display:inline-grid;place-items:center} .rbac-yes svg{width:16px;height:16px}
.rbac-no{color:var(--faint);opacity:.45;display:inline-grid;place-items:center} .rbac-no svg{width:13px;height:13px}
table.tbl.rbac .me{background:var(--accentSoft)}
table.tbl.rbac thead th.me{background:#dcefe8;color:#0a5e4c}
/* SAP Fiori launchpad */
.fiori-tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(204px,1fr));gap:14px}
.ftile{background:#fff;border:1px solid var(--line);border-top:3px solid var(--accent);border-radius:16px;padding:16px 18px;box-shadow:var(--shadow-sm);transition:.16s;overflow:hidden}
.ftile:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.ftile.navy{border-top-color:var(--navy)} .ftile.gold{border-top-color:var(--gold)} .ftile.danger{border-top-color:var(--danger)} .ftile.accent{border-top-color:var(--accent)}
.ftile .ft-lab{font-family:var(--sans);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ftile .ft-val{font-family:var(--serif-d);font-size:23px;font-weight:600;line-height:1.05;letter-spacing:-.01em;white-space:nowrap}
.ftile .ft-sub{font-family:var(--sans);font-size:11px;color:var(--faint);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ftile .ft-chart{margin-top:12px;height:36px;opacity:.92}
.widget-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;align-items:start}
@media(max-width:1100px){.widget-grid{grid-template-columns:1fr}}
.widget{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow-sm);overflow:hidden}
.widget-h{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--line)}
.widget-h h4{font-size:14px;display:flex;align-items:center;gap:8px;color:var(--ink)} .widget-h h4 svg{color:var(--soft)}
.widget-b{padding:14px 16px}
.widget-rm{background:transparent;border:0;color:var(--faint);cursor:pointer;width:26px;height:26px;border-radius:7px;display:grid;place-items:center}
.widget-rm:hover{background:var(--dangerSoft);color:var(--danger)} .widget-rm svg{width:15px;height:15px}
.add-tile{border:1.5px dashed #d8d2c6;background:var(--paper2);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;min-height:150px;cursor:pointer;color:var(--faint);font-family:var(--sans);font-weight:600;font-size:13px;transition:.15s}
.add-tile:hover{border-color:var(--accent);color:var(--accent);background:var(--accentSoft)}
.add-tile .add-ic{width:42px;height:42px;border-radius:11px;background:#fff;border:1px solid var(--line);display:grid;place-items:center} .add-tile:hover .add-ic{border-color:var(--accentLine)} .add-tile .add-ic svg{width:20px;height:20px}
.catalog{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:560px){.catalog{grid-template-columns:1fr}}
.cat-item{display:flex;gap:11px;align-items:flex-start;border:1px solid var(--line);border-radius:11px;padding:11px 12px;cursor:pointer;text-align:left;background:#fff;transition:.13s}
.cat-item:hover{border-color:var(--accentLine);box-shadow:var(--shadow-sm)}
.cat-item.added{opacity:.55;pointer-events:none}
.cat-ic{width:34px;height:34px;border-radius:9px;background:var(--accentSoft);color:var(--accent);display:grid;place-items:center;flex:0 0 auto} .cat-ic svg{width:17px;height:17px}

/* chips */
.chip{display:inline-flex;align-items:center;gap:5px;font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:.02em;padding:3px 9px;border-radius:20px;border:1px solid transparent;white-space:nowrap;line-height:1.5}
.chip .cdot{width:6px;height:6px;border-radius:50%;background:currentColor}
.chip.green{background:var(--accentSoft);color:#0a5e4c;border-color:var(--accentLine)}
.chip.grey{background:var(--paper2);color:var(--soft);border-color:var(--line)}
.chip.gold{background:var(--goldSoft);color:var(--gold);border-color:#e7d4ab}
.chip.amber{background:var(--warnSoft);color:var(--warn);border-color:#e7d9a8}
.chip.red{background:var(--dangerSoft);color:var(--danger);border-color:#e9c6bd}
.chip.navy{background:#e7edf3;color:var(--navy);border-color:#c7d4e0}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:18px;padding:0 6px;border-radius:20px;font-family:var(--sans);font-size:11px;font-weight:700;background:var(--danger);color:#fff;line-height:1}
.badge.muted{background:var(--paper2);color:var(--soft);border:1px solid var(--line)}
.badge.accent{background:var(--accent)} .badge.gold{background:var(--gold)} .badge.navy{background:var(--navy)}

/* tables */
.tbl-wrap{overflow:auto;border:1px solid var(--line);border-radius:var(--r-lg);background:#fff;box-shadow:var(--shadow-sm)}
table.tbl{width:100%;border-collapse:collapse;font-size:14px}
table.tbl thead th{font-family:var(--sans);text-transform:uppercase;letter-spacing:.07em;font-size:10.5px;font-weight:700;color:var(--faint);text-align:left;padding:12px 14px;border-bottom:1px solid var(--line);background:var(--paper2);position:sticky;top:0;white-space:nowrap;cursor:default;user-select:none}
table.tbl thead th.sortable{cursor:pointer}
table.tbl thead th.sortable:hover{color:var(--ink)}
table.tbl thead th .arr{opacity:.45;font-size:9px;margin-left:3px}
table.tbl tbody td{padding:12px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
table.tbl tbody tr:last-child td{border-bottom:0}
table.tbl tbody tr{transition:background .12s;cursor:default}
table.tbl tbody tr.click{cursor:pointer}
table.tbl tbody tr.click:hover{background:var(--paper2)}
.tbl .mono{font-size:12.5px;color:var(--soft)}
.tbl-foot{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 16px;border-top:1px solid var(--line);background:var(--paper);font-family:var(--sans);font-size:12.5px;color:var(--soft)}
.pager{display:flex;align-items:center;gap:4px}
.pager button{border:1px solid var(--line);background:#fff;color:var(--soft);min-width:30px;height:30px;border-radius:7px;font-family:var(--sans);font-size:12.5px;font-weight:600}
.pager button:hover:not(:disabled){border-color:#d8d2c6;color:var(--ink)}
.pager button.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.pager button:disabled{opacity:.4;cursor:not-allowed}

/* filters / search */
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.search{position:relative;flex:1;min-width:220px;max-width:420px}
.search input{width:100%;padding:9px 12px 9px 36px;border:1px solid var(--line);border-radius:9px;background:#fff;font-size:14px;color:var(--ink)}
.search input:focus{outline:none;border-color:var(--accentLine);box-shadow:0 0 0 3px var(--accentSoft)}
.search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--faint)}
.selct{position:relative}
.selct select{appearance:none;-webkit-appearance:none;background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px 30px 9px 12px;font-family:var(--sans);font-size:13px;font-weight:500;color:var(--ink)}
.selct select:focus{outline:none;border-color:var(--accentLine);box-shadow:0 0 0 3px var(--accentSoft)}
.selct::after{content:"";position:absolute;right:12px;top:50%;width:6px;height:6px;border-right:2px solid var(--faint);border-bottom:2px solid var(--faint);transform:translateY(-70%) rotate(45deg);pointer-events:none}

/* forms */
.field{margin-bottom:14px}
.field > label{display:block;font-family:var(--sans);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--soft);margin-bottom:6px}
.field input[type=text],.field input[type=number],.field select,.field textarea{
  width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);font-size:14.5px}
.field textarea{resize:vertical;min-height:70px;font-family:var(--serif-b)}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accentLine);box-shadow:0 0 0 3px var(--accentSoft)}
.field.err input,.field.err textarea,.field.err select{border-color:var(--danger);box-shadow:0 0 0 3px var(--dangerSoft)}
.field .hint{font-size:12px;color:var(--faint);margin-top:5px;font-family:var(--sans)}
.field .errmsg{font-size:12px;color:var(--danger);margin-top:5px;font-family:var(--sans);font-weight:600;display:none}
.field.err .errmsg{display:block}
.radio-row{display:flex;gap:8px;flex-wrap:wrap}
.radio-card{display:block;flex:1;min-width:120px;border:1px solid var(--line);border-radius:10px;padding:11px 13px;cursor:pointer;transition:.13s;background:#fff}
#rc-choices{display:flex;flex-direction:column;gap:8px}
.radio-card:hover{border-color:#d8d2c6}
.radio-card.on{border-color:var(--accent);background:var(--accentSoft);box-shadow:0 0 0 2px var(--accentSoft)}
.radio-card .rc-t{font-family:var(--sans);font-weight:700;font-size:13px}
.radio-card .rc-d{font-size:12px;color:var(--faint);font-family:var(--sans);margin-top:2px}

/* toggle */
.toggle{position:relative;width:46px;height:26px;border-radius:20px;background:#d6d0c4;border:0;transition:.2s;flex:0 0 auto;cursor:pointer}
.toggle .knob{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:.2s}
.toggle.on{background:var(--accent)}
.toggle.on .knob{left:23px}
.toggle.danger.on{background:var(--danger)}

/* skeleton */
.skel{background:linear-gradient(90deg,#f0ece4 25%,#f7f4ee 37%,#f0ece4 63%);background-size:400% 100%;animation:shimmer 1.3s ease infinite;border-radius:7px}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}
.skel-row{height:14px;margin:9px 0}

/* empty state */
.empty{text-align:center;padding:48px 20px;color:var(--faint)}
.e-ico{width:64px;height:64px;margin:0 auto 16px;color:var(--accent);background:var(--accentSoft);border:1px solid var(--accentLine);border-radius:18px;display:grid;place-items:center}
.e-ico svg{width:30px;height:30px;stroke-width:1.7}
.empty h3{color:var(--soft);margin-bottom:6px}
.empty p{font-size:14px;max-width:380px;margin:0 auto}

/* toast */
#toast-host{position:fixed;right:20px;bottom:20px;z-index:90;display:flex;flex-direction:column;gap:10px;align-items:flex-end}
.toast{display:flex;align-items:flex-start;gap:11px;min-width:280px;max-width:400px;background:var(--navy);color:#fff;padding:13px 15px;border-radius:11px;box-shadow:var(--shadow-lg);font-family:var(--sans);font-size:13.5px;animation:toastIn .28s cubic-bezier(.2,.8,.2,1);line-height:1.45}
.toast.ok{background:#0c5e4d} .toast.err{background:#8d3527} .toast.warn{background:#6e5518} .toast.info{background:var(--navy)}
.toast .t-ico{flex:0 0 auto;margin-top:1px} .toast .t-ico svg{width:17px;height:17px;display:block}
.toast .t-x{margin-left:auto;opacity:.7;cursor:pointer;background:transparent;border:0;color:#fff;padding:0 2px}
.toast strong{display:block;font-weight:700;margin-bottom:1px}
@keyframes toastIn{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
@keyframes toastOut{to{opacity:0;transform:translateX(20px)}}
.toast.out{animation:toastOut .25s forwards}

/* modal */
#modal-host{position:fixed;inset:0;z-index:80;display:none}
#modal-host.show{display:block}
.modal-scrim{position:absolute;inset:0;background:rgba(18,39,63,.34);backdrop-filter:blur(2px);animation:fade .2s}
.modal{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(560px,calc(100vw - 40px));max-height:calc(100vh - 60px);overflow:auto;background:var(--paper);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);animation:pop .24s cubic-bezier(.2,.8,.2,1)}
.modal-h{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line)}
.modal-b{padding:20px 22px}
.modal-f{display:flex;justify-content:flex-end;gap:9px;padding:16px 22px;border-top:1px solid var(--line);background:#fff;border-radius:0 0 var(--r-lg) var(--r-lg)}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes pop{from{opacity:0;transform:translate(-50%,-46%) scale(.97)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}

/* drawer */
#drawer-host{position:fixed;inset:0;z-index:70;display:none}
#drawer-host.show{display:block}
.drawer-scrim{position:absolute;inset:0;background:rgba(18,39,63,.3);animation:fade .2s}
.drawer{position:absolute;right:0;top:0;height:100%;width:min(560px,100vw);background:var(--paper);border-left:1px solid var(--line);box-shadow:var(--shadow-lg);overflow-y:auto;animation:slideIn .3s cubic-bezier(.2,.8,.2,1)}
@keyframes slideIn{from{transform:translateX(40px);opacity:.4}to{transform:none;opacity:1}}
.drawer-h{position:sticky;top:0;background:rgba(252,251,248,.92);backdrop-filter:blur(8px);padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;z-index:2}
.drawer-b{padding:20px 22px}
.icon-x{background:transparent;border:0;width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--soft)}
.icon-x:hover{background:var(--paper2);color:var(--ink)}

/* detail rows */
.dl{display:grid;grid-template-columns:140px 1fr;gap:2px 14px}
.dl dt{font-family:var(--sans);font-size:11px;text-transform:uppercase;letter-spacing:.06em;font-weight:700;color:var(--faint);padding:8px 0;border-bottom:1px solid var(--line)}
.dl dd{margin:0;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px}
.dl dt:last-of-type,.dl dd:last-of-type{border-bottom:0}

/* timeline */
.tl{position:relative;padding-left:24px}
.tl::before{content:"";position:absolute;left:6px;top:4px;bottom:4px;width:2px;background:var(--line)}
.tl-item{position:relative;padding:0 0 16px}
.tl-item::before{content:"";position:absolute;left:-21px;top:4px;width:11px;height:11px;border-radius:50%;background:#fff;border:2px solid var(--accent)}
.tl-item.navy::before{border-color:var(--navy)} .tl-item.gold::before{border-color:var(--gold)} .tl-item.red::before{border-color:var(--danger)} .tl-item.grey::before{border-color:var(--faint)}
.tl-item .tl-t{font-family:var(--sans);font-size:13px;font-weight:600}
.tl-item .tl-m{font-size:12.5px;color:var(--faint);font-family:var(--sans)}

/* code block */
.code{background:#0f2336;color:#d9e6f2;border-radius:var(--r);padding:15px 17px;font-family:var(--mono);font-size:12.5px;line-height:1.65;overflow:auto;border:1px solid #1d3850;white-space:pre}
.code .kw{color:#8fc7e8} .code .st{color:#a6d99a} .code .nm{color:#e7c98a} .code .cm{color:#6a8199} .code .pn{color:#c98aa8}
.sql-line{display:block}

/* diff two-up */
.twoup{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:760px){.twoup{grid-template-columns:1fr}}
.diff-col{border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.diff-col .dh{padding:10px 14px;font-family:var(--sans);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--line)}
.diff-col.field .dh{background:#e7edf3;color:var(--navy)}
.diff-col.captured .dh{background:var(--warnSoft);color:var(--warn)}
.diff-col .db{padding:6px 14px 12px}
.diff-row{display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.diff-row:last-child{border-bottom:0}
.diff-row .dk{color:var(--faint);font-family:var(--sans);font-size:11px;text-transform:uppercase;letter-spacing:.05em;font-weight:700}
.diff-row.changed{background:var(--warnSoft);margin:0 -14px;padding:7px 14px}

/* progress */
.prog{height:9px;border-radius:20px;background:var(--paper2);overflow:hidden;border:1px solid var(--line)}
.prog > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#13937a);border-radius:20px;transition:width .9s cubic-bezier(.2,.8,.2,1)}
.ring{transform:rotate(-90deg)}
.ring circle{fill:none;stroke-width:9}
.ring .bg{stroke:var(--paper2)} .ring .fg{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset 1s cubic-bezier(.2,.8,.2,1)}

/* activity */
.feed{display:flex;flex-direction:column}
.feed-item{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
.feed-item:last-child{border-bottom:0}
.feed-ico{width:30px;height:30px;border-radius:8px;flex:0 0 auto;display:grid;place-items:center;background:var(--paper2);color:var(--soft)}
.feed-ico svg{width:15px;height:15px}
.feed-item .fi-t{font-size:13.5px;line-height:1.45}
.feed-item .fi-m{font-size:11.5px;color:var(--faint);font-family:var(--sans);margin-top:2px}

/* no-access */
.noaccess{text-align:center;padding:60px 24px;max-width:520px;margin:30px auto}
.noaccess .na-ico{width:60px;height:60px;margin:0 auto 18px;border-radius:16px;background:var(--dangerSoft);color:var(--danger);display:grid;place-items:center}
.noaccess .na-ico svg{width:30px;height:30px}

/* mapping table */
.map-row{display:grid;grid-template-columns:1fr 30px 1fr;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--line)}
.map-row:last-child{border-bottom:0}
.map-arrow{color:var(--accent);display:grid;place-items:center}
.sap-f{font-family:var(--mono);font-size:12.5px;background:#e7edf3;color:var(--navy);padding:5px 9px;border-radius:7px;display:inline-block;border:1px solid #c7d4e0}
.int-f{font-family:var(--mono);font-size:12.5px;background:var(--accentSoft);color:#0a5e4c;padding:5px 9px;border-radius:7px;display:inline-block;border:1px solid var(--accentLine)}

/* import steps */
.step{display:flex;gap:12px;padding:10px 0;align-items:flex-start}
.step .st-dot{width:22px;height:22px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;border:2px solid var(--line);background:#fff;font-family:var(--sans);font-size:11px;font-weight:700;color:var(--faint);margin-top:1px}
.step.done .st-dot{background:var(--accent);border-color:var(--accent);color:#fff}
.step.active .st-dot{border-color:var(--accent);color:var(--accent)}
.step.active{}
.step .st-t{font-family:var(--sans);font-size:13.5px;font-weight:600}
.step .st-m{font-size:12px;color:var(--faint);font-family:var(--mono);margin-top:2px}
.step .spin{width:15px;height:15px;border:2px solid var(--accentLine);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-left:auto;margin-top:3px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ============ MOBILE / PHONE FRAME ============ */
.phone-stage{flex:1;display:flex;align-items:center;justify-content:center;gap:46px;padding:34px;background:
  radial-gradient(900px 500px at 30% -10%, #eef3f0 0%, transparent 60%),
  radial-gradient(800px 500px at 90% 110%, #f1ece2 0%, transparent 55%), var(--paper);flex-wrap:wrap}
.phone{width:380px;height:780px;background:#0c1620;border-radius:46px;padding:13px;box-shadow:var(--shadow-lg),0 0 0 2px #06101a,inset 0 0 0 2px #243140;position:relative;flex:0 0 auto}
.phone .notch{position:absolute;top:13px;left:50%;transform:translateX(-50%);width:130px;height:26px;background:#0c1620;border-radius:0 0 16px 16px;z-index:20}
.phone .notch::after{content:"";position:absolute;right:30px;top:9px;width:8px;height:8px;border-radius:50%;background:#1b2a38}
.screen{width:100%;height:100%;background:var(--paper);border-radius:34px;overflow:hidden;display:flex;flex-direction:column;position:relative}
.m-status{height:34px;display:flex;align-items:center;justify-content:space-between;padding:0 22px 0 26px;font-family:var(--sans);font-size:12px;font-weight:700;color:var(--ink);flex:0 0 auto;padding-top:6px}
.m-status .sig{display:flex;gap:4px;align-items:center}
.m-net{font-size:10px;font-weight:700;letter-spacing:.04em;padding:1px 6px;border-radius:5px}
.m-net.on{background:var(--accentSoft);color:#0a5e4c} .m-net.off{background:var(--dangerSoft);color:var(--danger)}
.m-top{padding:10px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line);flex:0 0 auto;background:rgba(252,251,248,.9)}
.m-top h3{font-size:16px} .m-top .m-sub{font-size:11px;color:var(--faint);font-family:var(--sans)}
.m-body{flex:1;overflow-y:auto;padding:14px 16px}
.m-body::-webkit-scrollbar{width:0}
.m-tabs{display:flex;border-top:1px solid var(--line);flex:0 0 auto;background:rgba(252,251,248,.95);padding:6px 6px max(8px,env(safe-area-inset-bottom))}
.m-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;border-radius:11px;font-family:var(--sans);font-size:9.5px;font-weight:600;color:var(--faint);cursor:pointer;border:0;background:transparent;letter-spacing:.02em}
.m-tab svg{width:21px;height:21px}
.m-tab.on{color:var(--accent)}
.m-card{background:#fff;border:1px solid var(--line);border-radius:13px;padding:13px 14px;margin-bottom:11px;box-shadow:var(--shadow-sm)}
.m-asset{display:flex;align-items:center;gap:11px;cursor:pointer}
.m-asset .ma-ic{width:38px;height:38px;border-radius:10px;background:var(--paper2);display:grid;place-items:center;flex:0 0 auto;color:var(--soft)}
.m-asset .ma-ic svg{width:19px;height:19px}
.m-asset .ma-t{font-family:var(--sans);font-weight:600;font-size:13.5px;line-height:1.3}
.m-asset .ma-m{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:2px}
.m-bignum{font-family:var(--serif-d);font-size:40px;font-weight:600;line-height:1}
.m-pill-row{display:flex;gap:7px;flex-wrap:wrap}
.m-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border-radius:13px;font-family:var(--sans);font-weight:700;font-size:14px;border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer}
.m-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.m-btn.navy{background:var(--navy);border-color:var(--navy);color:#fff}
.m-btn svg{width:18px;height:18px}
.m-login{flex:1;display:flex;flex-direction:column;justify-content:center;padding:34px 26px;gap:7px}
.cap-path{display:flex;gap:9px;align-items:center;padding:14px;border:1px solid var(--line);border-radius:13px;background:#fff;cursor:pointer;margin-bottom:10px;transition:.13s}
.cap-path:hover{border-color:var(--accentLine);box-shadow:var(--shadow-sm)}
.cap-path .cp-ic{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;flex:0 0 auto;background:var(--accentSoft);color:var(--accent)}
.cap-path .cp-ic svg{width:21px;height:21px}
.cap-path .cp-t{font-family:var(--sans);font-weight:700;font-size:14px}
.cap-path .cp-d{font-size:12px;color:var(--faint);font-family:var(--sans);margin-top:1px}
.scan-anim{height:160px;border-radius:14px;background:#0c1620;position:relative;overflow:hidden;margin-bottom:12px;display:grid;place-items:center}
.scan-anim .laser{position:absolute;left:8%;right:8%;height:2px;background:linear-gradient(90deg,transparent,#19c39c,transparent);box-shadow:0 0 12px #19c39c;animation:scan 1.5s ease-in-out infinite}
@keyframes scan{0%,100%{top:18%}50%{top:82%}}
.scan-anim .reticle{width:160px;height:100px;border:2px solid rgba(255,255,255,.5);border-radius:10px}
.phone-side{max-width:330px}
.phone-side .ps-k{font-family:var(--sans);text-transform:uppercase;letter-spacing:.12em;font-size:10.5px;font-weight:700;color:var(--faint);margin-bottom:8px}
.phone-side h2{margin-bottom:10px}
.phone-side p{font-size:14.5px;color:var(--soft);margin:0 0 14px}
.ps-feat{display:flex;gap:11px;margin-bottom:14px}
.ps-feat .psf-ic{width:34px;height:34px;border-radius:9px;background:#fff;border:1px solid var(--line);display:grid;place-items:center;flex:0 0 auto;color:var(--accent)}
.ps-feat .psf-t{font-family:var(--sans);font-weight:700;font-size:13.5px}
.ps-feat .psf-d{font-size:13px;color:var(--faint)}

/* ============ GUIDED TOUR ============ */
#tour-host{position:fixed;inset:0;z-index:85;display:none;pointer-events:none}
#tour-host.show{display:block}
.tour-scrim{position:absolute;inset:0;background:rgba(12,22,30,.55);pointer-events:auto;transition:clip-path .3s}
.tour-ring{position:absolute;border:2px solid var(--accent);border-radius:12px;box-shadow:0 0 0 4px rgba(12,122,99,.25),0 0 0 9999px rgba(12,22,30,.55);pointer-events:none;transition:.32s cubic-bezier(.2,.8,.2,1);z-index:2}
.tour-pop{position:absolute;width:340px;background:var(--paper);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow-lg);pointer-events:auto;z-index:3;transition:.32s cubic-bezier(.2,.8,.2,1);overflow:hidden}
.tour-pop .tp-h{padding:13px 16px 0;display:flex;align-items:center;justify-content:space-between}
.tour-pop .tp-step{font-family:var(--sans);font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent)}
.tour-pop .tp-b{padding:8px 16px 14px}
.tour-pop .tp-b h4{font-size:16px;margin-bottom:5px;font-family:var(--serif-d)}
.tour-pop .tp-b p{font-size:13.5px;color:var(--soft);margin:0;line-height:1.5}
.tour-pop .tp-why{margin-top:9px;padding:9px 11px;background:var(--accentSoft);border-radius:9px;font-size:12.5px;color:#0a5e4c;font-family:var(--sans);line-height:1.45}
.tour-pop .tp-why b{font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-size:10px}
.tour-pop .tp-f{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-top:1px solid var(--line);background:#fff}
.tour-picks{display:flex;flex-direction:column;gap:8px}
.tour-pick{display:flex;align-items:center;gap:12px;width:100%;text-align:left;border:1px solid var(--line);background:#fff;border-radius:12px;padding:11px 13px;cursor:pointer;transition:.14s;font-family:var(--sans);color:var(--soft)}
.tour-pick:hover{border-color:var(--accentLine);box-shadow:var(--shadow-sm);transform:translateX(2px);color:var(--ink)}
.tour-pick .tp-ic{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;flex:0 0 auto;background:var(--paper2);color:var(--soft)}
.tour-pick .tp-ic.navy{background:#e7edf3;color:var(--navy)} .tour-pick .tp-ic.gold{background:var(--goldSoft);color:var(--gold)} .tour-pick .tp-ic.accent{background:var(--accentSoft);color:var(--accent)}
.tour-pick .tp-ic svg{width:18px;height:18px}
.tour-pick .tp-name{display:block;font-weight:700;font-size:14px;color:var(--ink)}
.tour-pick .tp-desc{display:block;font-size:12px;color:var(--faint);margin-top:1px}
.tour-pop .tp-prog{font-family:var(--sans);font-size:11.5px;color:var(--faint);font-weight:600}
.tour-fab{position:fixed;right:22px;bottom:22px;z-index:60;display:flex;align-items:center;gap:9px;background:var(--navy);color:#fff;border:0;padding:12px 18px;border-radius:30px;font-family:var(--sans);font-weight:700;font-size:13px;box-shadow:var(--shadow-lg);cursor:pointer}
.tour-fab:hover{background:#1a3450}
.tour-fab svg{width:17px;height:17px}

/* misc utilities */
.row{display:flex;gap:10px;align-items:center}
.row.wrap{flex-wrap:wrap}
.between{justify-content:space-between}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt20{margin-top:20px}.mt24{margin-top:24px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}
.gap6{gap:6px}.gap8{gap:8px}.gap12{gap:12px}.gap16{gap:16px}
.flex1{flex:1}
.right{margin-left:auto}
.center{text-align:center}
.hidden{display:none!important}
.divider{height:1px;background:var(--line);margin:16px 0}
.callout{display:flex;gap:11px;padding:13px 15px;border-radius:11px;font-size:13.5px;line-height:1.5}
.callout svg{width:18px;height:18px;flex:0 0 auto;margin-top:1px}
.callout.navy{background:#e7edf3;color:var(--navy);border:1px solid #c7d4e0}
.callout.accent{background:var(--accentSoft);color:#0a5e4c;border:1px solid var(--accentLine)}
.callout.gold{background:var(--goldSoft);color:var(--gold);border:1px solid #e7d4ab}
.callout.danger{background:var(--dangerSoft);color:var(--danger);border:1px solid #e9c6bd}
.tag-immutable{font-family:var(--sans);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--navy);background:#e7edf3;padding:2px 7px;border-radius:6px;border:1px solid #c7d4e0;display:inline-flex;align-items:center;gap:4px}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
.spinner.dark{border-color:var(--accentLine);border-top-color:var(--accent)}
.fade-in{animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.pulse{animation:pulse 1.6s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
@media(max-width:920px){.shell{grid-template-columns:1fr}.sidebar{display:none}.view{padding:20px}}

const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const sleep = ms => new Promise(r=>setTimeout(r,ms));
const rnd = (a,b)=> a + Math.floor(Math.random()*(b-a+1));
const pick = arr => arr[Math.floor(Math.random()*arr.length)];
const clamp = (v,a,b)=> Math.max(a,Math.min(b,v));
let _idc = 0;
function uuid(){
  // RFC4122-ish v4; deterministic-ish counter mixed in to be readable in demo
  _idc++;
  const h = ()=> Math.floor((1+Math.random())*0x10000).toString(16).slice(1);
  return h()+h()+'-'+h()+'-4'+h().slice(1)+'-'+((8+Math.floor(Math.random()*4)).toString(16))+h().slice(1)+'-'+h()+h()+h();
}
function shortId(id){ return id ? String(id).slice(0,8) : ''; }
function hashContent(obj){
  // tiny deterministic content hash (FNV-1a) -> hex; for "immutable event" feel
  const str = JSON.stringify(obj);
  let h = 0x811c9dc5;
  for(let i=0;i<str.length;i++){ h ^= str.charCodeAt(i); h = (h + ((h<<1)+(h<<4)+(h<<7)+(h<<8)+(h<<24)))>>>0; }
  return ('00000000'+h.toString(16)).slice(-8);
}
function fmtMoney(n){
  const v = Math.round(Number(n)||0);
  return v.toLocaleString('de-DE') + ' KM';
}
function fmtMoneyShort(n){
  const v = Math.round(Number(n)||0), a = Math.abs(v);
  if(a>=1e6) return (v/1e6).toFixed(2).replace(/\.?0+$/,'') + 'M KM';
  if(a>=1e4) return Math.round(v/1e3) + 'k KM';
  if(a>=1e3) return (v/1e3).toFixed(1).replace(/\.0$/,'') + 'k KM';
  return v.toLocaleString('de-DE') + ' KM';
}
function fmtNum(n){ return (Number(n)||0).toLocaleString('en-US'); }
function fmtDate(ts){
  if(!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function fmtDateShort(ts){ if(!ts)return '—'; return new Date(ts).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function timeAgo(ts){
  const s = Math.floor((Date.now()-ts)/1000);
  if(s<60) return s+'s ago';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}
function debounce(fn,ms){ let t; return function(){ const a=arguments,c=this; clearTimeout(t); t=setTimeout(()=>fn.apply(c,a),ms); }; }

/* ===========================================================================
   MODULE: store — single reactive state container + localStorage persistence
   The UI subscribes to the store. Only the api module mutates domain data;
   UI-only flags (route, surface, role) go through store.setUI.
   =========================================================================== */
const STORE_KEY = 'horalix.inventory.v5';
const Store = (function(){
  let state = null;
  const subs = [];
  let saveTimer = null;

  function load(){
    try{
      const raw = localStorage.getItem(STORE_KEY);
      if(raw){ const parsed = JSON.parse(raw); if(parsed && parsed.version===5) return parsed; }
    }catch(e){ /* corrupt → reseed */ }
    return null;
  }
  function persist(){
    clearTimeout(saveTimer);
    saveTimer = setTimeout(()=>{
      try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){ /* quota — non-fatal in demo */ }
    }, 120);
  }
  function init(){
    state = load() || seedData();
    persist();
    return state;
  }
  function get(){ return state; }
  function subscribe(fn){ subs.push(fn); return ()=>{ const i=subs.indexOf(fn); if(i>=0)subs.splice(i,1); }; }
  function notify(){ subs.forEach(fn=>{ try{ fn(state); }catch(e){ console.warn('subscriber error', e); } }); }
  /* commit applies a mutator function to state, persists, and notifies subscribers */
  function commit(mutator){
    if(typeof mutator==='function') mutator(state);
    persist();
    notify();
  }
  function setUI(patch, silent){
    Object.assign(state.ui, patch);
    persist();
    if(!silent) notify();
  }
  function reset(){
    state = seedData();
    persist();
    notify();
    return state;
  }
  return {init, get, subscribe, notify, commit, setUI, reset};
})();

/* --- internal: append-only audit writer (operates on state inside a commit) --- */
/* --- tamper-evident audit: each row is hash-chained to the previous one --- */
function auditRowHash(seq, r, prev){
  return hashContent({s:seq, a:r.actor, ac:r.action, e:r.entity_id, o:r.old, n:r.new, ap:r.approval, t:r.ts, p:prev});
}
function chainAudit(audit, row){
  const prev = audit.length ? audit[audit.length-1].hash : 'genesis0';
  row.seq = audit.length + 1;
  row.prevHash = prev;
  row.hash = auditRowHash(row.seq, row, prev);
  return row;
}
function verifyAuditChain(audit){
  let prev='genesis0', broken=null;
  for(let i=0;i<audit.length;i++){
    const r=audit[i];
    const h=auditRowHash(i+1, r, prev);
    if(r.prevHash!==prev || r.hash!==h){ broken={index:i, id:r.id, action:r.action}; break; }
    prev=r.hash;
  }
  return {ok:!broken, count:audit.length, broken, head:prev};
}
function _audit(s, o){
  const row = {
    id:'au'+(s.seq.audit++), correlation_id:o.correlation_id||uuid(),
    ts:Date.now(), actor:o.actor||Sel.currentUser().name, role:o.role||s.ui.role,
    action:o.action, entity:o.entity||'', entity_id:o.entity_id||'',
    old:(o.old==null?'—':o.old), new:(o.new==null?'—':o.new),
    approval:o.approval||'—', reason:o.reason||'', device:o.device||'web/portal'
  };
  chainAudit(s.audit, row);
  s.audit.push(row); return row;
}
function _activity(s, o){ s.activity.unshift(Object.assign({id:uuid(), ts:Date.now()}, o)); if(s.activity.length>60)s.activity.length=60; }

/* --- internal: reconciliation engine — classify one event into one disposition --- */
function _classify(s, ev){
  const corr = uuid();
  const base = {id:'d'+uuid().slice(0,8), event_id:ev.id, correlation_id:corr,
    inventory_no:ev.inventory_no, asset_id:ev.asset_id, capturedBy:ev.actor,
    commission_id:ev.commission_id, ts:ev.ts, amount:0, financial:false};
  const asset = ev.asset_id ? s.assets.find(a=>a.id===ev.asset_id) : null;

  // SURPLUS — unregistered physical asset, no book record → financial → review
  if(ev.status==='surplus'){
    return Object.assign(base,{asset_name:ev.surplus_name||'Unregistered asset', klass:'surplus',
      financial:true, routedTo:'review', status:'open', amount:Number(ev.surplus_value)||0,
      detail:{estValue:Number(ev.surplus_value)||0, category:ev.surplus_category,
        location:Sel.locName(ev.location_id)||'—', note:'Physical asset with no matching book record.'}});
  }
  // SHORTAGE — booked asset not physically found → financial → review
  if(ev.status==='shortage'){
    return Object.assign(base,{asset_name:asset?asset.name:'(unknown)', klass:'shortage',
      financial:true, routedTo:'review', status:'open', amount:asset?-asset.book_value:0,
      detail:{bookValue:asset?asset.book_value:0, note:'Asset not physically located.'}});
  }
  // DAMAGED / WRITTEN-OFF — value change / impairment → financial → review
  if(ev.status==='damaged' || ev.status==='written-off'){
    const impair = ev.status==='written-off' ? (asset?asset.book_value:0) : Math.round((asset?asset.book_value:0)*0.5);
    return Object.assign(base,{asset_name:asset?asset.name:'(unknown)', klass:'value-change',
      financial:true, routedTo:'review', status:'open', amount:-impair,
      detail:{bookValue:asset?asset.book_value:0, disposition:ev.status, impairment:impair,
        note:ev.status==='written-off'?'Full write-off requested (photo attached).':'Damage impairment estimate (50%).'}});
  }
  // FOUND — could be duplicate, metadata-diff, or clean match
  if(ev.status==='found'){
    // duplicate: asset already counted (a prior matched disposition exists for this asset)
    const priorMatch = s.dispositions.find(d=>d.asset_id===ev.asset_id && d.klass==='matched' && d.event_id!==ev.id);
    if(priorMatch && asset){
      return Object.assign(base,{asset_name:asset.name, klass:'duplicate-conflict', financial:false,
        routedTo:'conflict', status:'open',
        detail:{firstEventId:priorMatch.event_id, secondEventId:ev.id, firstBy:priorMatch.capturedBy,
          secondBy:ev.actor, firstTs:priorMatch.ts, secondTs:ev.ts,
          reason:'Asset already counted earlier in this campaign — duplicate physical count.'}});
    }
    // metadata diff: captured location correction differs from book → stale master → conflict
    if(asset && ev.correctedLocationId && ev.correctedLocationId!==asset.location_id){
      return Object.assign(base,{asset_name:asset.name, klass:'metadata-diff', financial:false,
        routedTo:'conflict', status:'open',
        detail:{field:'location_id', book:asset.location_id, bookLabel:Sel.locName(asset.location_id),
          field2:'custodian', captured:ev.correctedLocationId, capturedLabel:Sel.locName(ev.correctedLocationId),
          reason:'Physical location differs from book — possible stale master data.'}});
    }
    // clean match → auto-close
    return Object.assign(base,{asset_name:asset?asset.name:'(unknown)', klass:'matched', financial:false,
      routedTo:'closed', status:'auto-closed', detail:{note:'Physical presence verified; matches book record.'}});
  }
  // fallback
  return Object.assign(base,{asset_name:asset?asset.name:'(unknown)', klass:'matched', financial:false,
    routedTo:'closed', status:'auto-closed', detail:{}});
}

/* --- internal: persist + classify one new event (mutates state) --- */
function _processEvent(s, ev){
  s.events.push(ev);
  const disp = _classify(s, ev);
  s.dispositions.push(disp);
  s.serverEvents[ev.id] = {ackTs:Date.now(), dispositionId:disp.id};
  const asset = ev.asset_id ? s.assets.find(a=>a.id===ev.asset_id) : null;
  if(asset){
    const statusMap = {found:'counted', shortage:'shortage', damaged:'damaged', 'written-off':'written-off'};
    if(disp.klass==='duplicate-conflict') asset.status='conflict';
    else if(disp.klass==='metadata-diff') asset.status='conflict';
    else asset.status = statusMap[ev.status] || asset.status;
    asset.lastEventId = ev.id;
    if(ev.photo) asset.photo = ev.photo;
    asset.history.push({ts:ev.ts, actor:ev.actor, action:'Counted — '+ev.status+' ('+disp.klass+')', evId:ev.id, dispId:disp.id});
  }
  // audit (correlation_id links field event → disposition → later review/candidate)
  const actionMap = {matched:'RECON_MATCHED', 'metadata-diff':'RECON_METADATA_DIFF',
    'duplicate-conflict':'RECON_DUPLICATE_CONFLICT', shortage:'RECON_SHORTAGE', surplus:'RECON_SURPLUS', 'value-change':'RECON_VALUE_CHANGE'};
  _audit(s,{correlation_id:disp.correlation_id, actor:ev.actor, role:ev.role||'Commission Member',
    action:actionMap[disp.klass]||'RECON', entity:'asset', entity_id:ev.inventory_no||'(unregistered)',
    old:'captured: '+ev.status, new:'disposition: '+disp.klass+' → '+disp.routedTo, device:ev.device});
  // activity feed
  const actIcon = {matched:'checkCircle','metadata-diff':'edit','duplicate-conflict':'alert',shortage:'trendingDown',surplus:'trendingUp','value-change':'zap'};
  const actText = {
    matched:'<b>Matched</b> '+(ev.inventory_no||'')+' verified by '+ev.actor,
    'metadata-diff':'<b>Stale master</b> on '+(ev.inventory_no||'')+' → Conflict Inbox',
    'duplicate-conflict':'<b>Duplicate scan</b> on '+(ev.inventory_no||'')+' → Conflict Inbox',
    shortage:'<b>Shortage</b> on '+(ev.inventory_no||'')+' → Review gate ('+fmtMoney(Math.abs(disp.amount))+')',
    surplus:'<b>Surplus candidate</b> '+(disp.asset_name)+' → Review gate',

  async listAssets(query){
    await net(160, 460);

    if(q.search){
      const t = q.search.toLowerCase();
      rows = rows.filter(a=> a.name.toLowerCase().includes(t) || a.inventory_no.toLowerCase().includes(t)
        || a.serial.toLowerCase().includes(t) || (a.custodian||'').toLowerCase().includes(t));

    if(q.category) rows = rows.filter(a=> a.category===q.category);
    if(q.status) rows = rows.filter(a=> a.status===q.status);
    const sortKey = q.sort||'inventory_no', dir = q.dir==='desc'?-1:1;
    rows.sort((a,b)=>{
      let x=a[sortKey], y=b[sortKey];
      if(sortKey==='location_id'){ x=Sel.locName(x); y=Sel.locName(y); }
      if(typeof x==='string'){ return x.localeCompare(y)*dir; }
      return (x-y)*dir;
    });
    const total = rows.length;

    const pages = Math.max(1, Math.ceil(total/pageSize));
    const page = clamp(q.page||1, 1, pages);
    const items = rows.slice((page-1)*pageSize, page*pageSize);
    return {items, total, page, pages, pageSize};

  /* ---- the heart: idempotent + resumable batch sync with reconciliation ----
     Network-drop model: the server still COMMITS events, but the client never
     receives the ACKs for events after the drop point. Those stay in the outbox
     and are re-sent on the next sync — where the server recognises them as
     already-received (idempotent) and returns the prior ACK, so no duplicates. */
  async syncBatch(events, opts){
    opts = opts||{};
    await net(220, 520);
    const acks = []; const newDisps = []; let duplicates = 0; let lostAcks = 0;
    const dropAt = opts.simulateDrop ? Math.max(1, Math.ceil(events.length/2)) : Infinity;
    Store.commit(s=>{
      for(let idx=0; idx<events.length; idx++){
        const ev = events[idx];
        const existing = s.serverEvents[ev.id];
        if(existing){                                          // IDEMPOTENT: already received → return prior ACK
          duplicates++;
          acks.push({id:ev.id, status:'duplicate', dispositionId:existing.dispositionId, inventory_no:ev.inventory_no});
          continue;
        }
        const disp = _processEvent(s, ev);                    // server commits the event + reconciles it
        newDisps.push(disp);
        if(idx>=dropAt){ lostAcks++; continue; }              // committed, but ACK is "lost" on the wire → no ack returned
        acks.push({id:ev.id, status:'ack', dispositionId:disp.id, klass:disp.klass, routedTo:disp.routedTo, inventory_no:ev.inventory_no});
      }
    });
    return {ok:lostAcks===0, dropped:lostAcks>0, acks, processed:acks.length, total:events.length,
      duplicates, lostAcks, remaining: lostAcks, newDisps,
      summary: newDisps.reduce((m,d)=>{ m[d.klass]=(m[d.klass]||0)+1; return m; }, {})};
  },

  /* ---- mobile: queue an event locally (client outbox, validated) ---- */
  async captureLocal(evt){

    if((evt.status==='written-off'||evt.status==='damaged') && !evt.photo){

  /* ---- resolve a conflict (President) ---- */
  async resolveConflict(dispId, decision, reason){
    await net(180, 420);
    if(!canResolveConflict()) throw {status:403, message:'Your role cannot resolve conflicts.'};
    let result=null;
    Store.commit(s=>{
      const d = s.dispositions.find(x=>x.id===dispId); if(!d) return;
      d.status='resolved'; d.resolution=decision; d.resolvedBy=Sel.currentUser().name; d.resolvedReason=reason; d.resolvedTs=Date.now();
      const asset = d.asset_id ? s.assets.find(a=>a.id===d.asset_id) : null;
      if(d.klass==='duplicate-conflict'){
        // keep one count, void the duplicate; asset returns to counted
        if(asset) asset.status='counted';
      } else if(d.klass==='metadata-diff'){
        if(decision==='update-master' && asset){
          // produce a non-financial metadata change that ERP-syncs automatically after review
          d.status='metadata-ready';
          asset.location_id = d.detail.captured || asset.location_id;
          asset.status='counted';
        } else if(asset){ asset.status='counted'; }
      }
      _audit(s,{correlation_id:d.correlation_id, action:'CONFLICT_RESOLVED', entity:'asset',
        entity_id:d.inventory_no||'(unregistered)', old:'conflict:'+d.klass, new:'decision: '+decision,
        approval:Sel.currentUser().name, reason});
      _activity(s,{type:'resolve', icon:'check', text:'<b>Conflict resolved</b> on '+(d.inventory_no||d.asset_name)+' — '+decision});
      result = JSON.parse(JSON.stringify(d));
    });
    return {ok:true, disposition:result};
  },

  /* ---- approve / reject a financial exception (Accounting gate) ---- */
  async approve(dispId, decision, reason){
    await net(200, 460);
    const d = Sel.dispositions().find(x=>x.id===dispId);
    if(!d) throw {status:404, message:'Exception not found.'};
    const gate = canApproveReview(d);
    if(!gate.ok){
      if(gate.reason==='sod') throw {status:403, message:'Separation of duties: you captured this exception and cannot approve it. It must be approved by another authorised user.'};
      throw {status:403, message:'Your role cannot approve financial exceptions. Accounting approval is required.'};
    }
    if(!reason || reason.trim().length<3) throw {status:422, message:'A reason is required to record this decision.'};
    let result=null;
    Store.commit(s=>{
      const dd = s.dispositions.find(x=>x.id===dispId);
      dd.status = decision==='approve' ? 'approved' : 'rejected';
      dd.decision = decision; dd.decidedBy = Sel.currentUser().name; dd.decidedReason = reason; dd.decidedTs = Date.now();
      const asset = dd.asset_id ? s.assets.find(a=>a.id===dd.asset_id) : null;
      if(decision==='reject' && asset){ asset.status='counted'; } // restored to counted, no financial effect
      _audit(s,{correlation_id:dd.correlation_id, action: decision==='approve'?'EXCEPTION_APPROVED':'EXCEPTION_REJECTED',
        entity:'asset', entity_id:dd.inventory_no||'(unregistered)',
        old:'status: open ('+dd.klass+')', new: decision==='approve'?'posting candidate':'rejected',
        approval:Sel.currentUser().name, reason});

/* ===========================================================================
   MODULE: SAP server (SIMULATED ERP backend, in-browser)
   The platform NEVER posts automatically. A human RELEASES a prepared
   candidate here, which generates real SAP documents (BELNR) in this
   simulated SAP and updates the SAP-side asset master.
   =========================================================================== */
function _sapCall(s, entry){ s.sap.callLog.unshift(Object.assign({ts:Date.now()}, entry)); if(s.sap.callLog.length>140) s.sap.callLog.length=140; }
function sapTxFor(d){
  if(d.klass==='shortage') return {doctype:'Asset Retirement', txCode:'ABAVN', bapi:'BAPI_FIXEDASSET_RETIREMENT_POST', effect:'retire'};
  if(d.klass==='surplus')  return {doctype:'Asset Acquisition', txCode:'ABZON', bapi:'BAPI_FIXEDASSET_CREATE', effect:'create'};
  if(d.klass==='value-change'){
    const wo = d.detail && d.detail.disposition==='written-off';
    return wo ? {doctype:'Asset Retirement (write-off)', txCode:'ABAVN', bapi:'BAPI_FIXEDASSET_RETIREMENT_POST', effect:'retire'}
              : {doctype:'Unplanned Depreciation', txCode:'ABAA', bapi:'BAPI_FIXEDASSET_CHANGE', effect:'impair'};
  }
  if(d.klass==='metadata-diff') return {doctype:'Master Data Change', txCode:'AS02', bapi:'BAPI_FIXEDASSET_CHANGE', effect:'master'};
  return {doctype:'Value Adjustment', txCode:'ABAA', bapi:'BAPI_FIXEDASSET_CHANGE', effect:'impair'};
}
api.sapStatus = function(){
  const s=Store.get();
  let capital=0, nbv=0;
  s.assets.forEach(x=>{ const live = !(x.sapStatus==='retired'||x.status==='written-off');
    if(live){ capital += (x.acquisition_value||x.book_value); nbv += x.book_value; } });
  const retired=s.assets.filter(x=>x.sapStatus==='retired').length;
  return {system:s.sap.system, client:s.sap.client, companyCode:s.sap.companyCode, connected:s.sap.connected,
    master:s.assets.length, capital, nbv, retired, documents:s.sap.documents.length, calls:s.sap.callLog.length};
};
api.sapPost = async function(postingId, onStep){
  const posting = Store.get().postings.find(p=>p.id===postingId);
  if(!posting) throw {status:404, message:'Posting candidate not found.'};
  if(posting.posted) return {ok:true, alreadyPosted:true, documents:posting.documents};
  const items = Store.get().dispositions.filter(d=> d.postingId===postingId && d.status==='posting-candidate');
  if(!items.length) throw {status:409, message:'This candidate has no releasable items.'};
  const steps=[
    {t:'Opening RFC connection to SAP', m:'client 100 · company BHT1 · user RFC_HORALIX'},
    {t:'Validating against SAP posting rules', m:'period open · cost centers valid · authorisation check'},
    {t:'Posting documents via BAPI', m:items.length+' item(s) · BAPI_FIXEDASSET_*'},
    {t:'BAPI_TRANSACTION_COMMIT', m:'commit work · generating document numbers'},
    {t:'Reading back BELNR', m:'FI/CO documents created in SAP'}
  ];
  for(let i=0;i<steps.length;i++){ if(onStep)onStep(i,steps[i],false); await net(380,640); if(onStep)onStep(i,steps[i],true); }
  const docs=[];
  Store.commit(s=>{
    _sapCall(s,{dir:'in', kind:'RFC', name:'RFC_LOGIN', summary:'client 100 · user RFC_HORALIX', status:'authenticated'});
    items.forEach(it=>{
      const d=s.dispositions.find(x=>x.id===it.id); if(!d)return;
      const tx=sapTxFor(d);
      const belnr=String(s.sap.seq.belnr++);
      let amount=Math.abs(d.amount||0), assetRef=d.inventory_no||'(new)';
      if(tx.effect==='create'){
        const newInv='INV-'+String(s.sap.seq.anln++).padStart(6,'0');
        const loc=(s.commissions.find(c=>c.id===d.commission_id)||{}).locationIds; const locId=(loc&&loc[0])||'dir-sa-wh';
        s.assets.push({id:'a'+uuid().slice(0,6), inventory_no:newInv, anln2:'0000', name:d.asset_name,
          serial:'SAP-'+belnr, category:(d.detail&&d.detail.category)||'switches', asset_class:'3100 · IT Endpoint',
          location_id:locId, cost_center:'100200 · IT & Mreža SA', custodian:'BH Telecom', acquired:Date.now(),
          book_value:amount, status:'counted', sapStatus:'active',
          history:[{ts:Date.now(), actor:'SAP · ABZON', action:'Asset created in SAP via posting — '+newInv}], photo:null, lastEventId:null});
        assetRef=newInv;
      } else if(tx.effect==='retire'){
        const a=s.assets.find(x=>x.id===d.asset_id); if(a){ a.sapStatus='retired'; a.history.push({ts:Date.now(), actor:'SAP · ABAVN', action:'Asset retired in SAP — doc '+belnr}); }
      } else if(tx.effect==='impair'){
        const a=s.assets.find(x=>x.id===d.asset_id); if(a){ a.sapStatus='impaired'; a.history.push({ts:Date.now(), actor:'SAP · ABAA', action:'Unplanned depreciation posted — doc '+belnr}); }
      } else if(tx.effect==='master'){
        const a=s.assets.find(x=>x.id===d.asset_id); if(a){ a.history.push({ts:Date.now(), actor:'SAP · AS02', action:'Master data changed in SAP — change doc '+belnr}); }
      }
      const doc={ id:'doc'+belnr, belnr, doctype:tx.doctype, txCode:tx.txCode, bapi:tx.bapi, klass:d.klass,
        asset:assetRef, amount, date:Date.now(), fiscalYear:s.fiscalYear, period:new Date().getMonth()+1,
        correlation_id:d.correlation_id, byUser:Sel.currentUser().name };
      s.sap.documents.unshift(doc); docs.push(doc);
      _sapCall(s,{dir:'in', kind:'BAPI', name:tx.bapi, summary:assetRef+' · '+tx.doctype+' · '+fmtMoney(amount), status:'OK · BELNR '+belnr});
      d.status='posted'; d.postedBelnr=belnr; d.postedTs=Date.now();
      _audit(s,{correlation_id:d.correlation_id, action:'POSTED_TO_SAP', entity:'sap', entity_id:assetRef,
        old:'posting candidate', new:tx.doctype+' · BELNR '+belnr+' ('+tx.txCode+')', approval:Sel.currentUser().name,
        reason:'Released to SAP by '+Sel.currentUser().name+'.', device:'web/portal → SAP'});
    });
    _sapCall(s,{dir:'in', kind:'BAPI', name:'BAPI_TRANSACTION_COMMIT', summary:posting.id+' · '+docs.length+' document(s)', status:'COMMIT OK'});
    const p=s.postings.find(x=>x.id===postingId);
    p.posted=true; p.postedTs=Date.now();
    p.documents=docs.map(x=>({belnr:x.belnr, doctype:x.doctype, asset:x.asset, amount:x.amount, txCode:x.txCode}));
    _activity(s,{type:'erp', icon:'database', text:'<b>Posted to SAP</b> '+posting.id+' — '+docs.length+' document(s): '+docs.map(x=>x.belnr).join(', ')});
  });

api.updateAsset = async function(id, patch){

/* ===========================================================================
   MODULE: ai (SIMULATED) — schema-only NL→SQL, validated read-only execution
